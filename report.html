<script type="text/njk-template" id="tpl-ch16">@@H1@@Chapter 14. Conclusion & Recommendation

@@H2@@14.1 Feasibility conclusions

@@H3@@14.1.1 Technical feasibility

@@P@@The project uses a recirculating aquaculture (RAS) process with 20+ years of industrial application in Norway, Denmark, Scotland and elsewhere, alongside many mature projects in other regions. The architecture is a hybrid series-mainline + parallel-bypass design with {{ farm.totalSubSystems }} independent recirculation modules and N+1 redundancy; key parameters (mass balance, equipment selection, heat balance) are calibrated against international literature and field data.

@@P@@<strong>Conclusion: fully feasible on technical grounds.</strong>

@@H3@@14.1.2 Economic and financial feasibility

@@P@@The project's main financial indicators:

@@TABLE@@
Indicator|Value|Benchmark|Result
Total-investment IRR (after tax)|{{ (finance.indicators.irrTotal*100)|round(2) }}%|≥ {{ (finance.params.discount*100)|round(1) }}%|{{ 'Met' if finance.indicators.irrTotal >= finance.params.discount else 'Not met' }}
Equity IRR|{{ (finance.indicators.irrEquity*100)|round(2) }}%|—|—
Total-investment NPV|{{ finance.indicators.npvTotal|wan }} EUR|≥ 0|{{ 'Met' if finance.indicators.npvTotal >= 0 else 'Not met' }}
Static payback|{{ finance.indicators.paybackTotal|round(2) }} yr|≤ 8 yr|{{ 'Met' if finance.indicators.paybackTotal <= 8 else 'Watch' }}
Break-even point|{{ finance.indicators.bepPct|round(1) }}% of capacity|≤ 75%|{{ 'Large margin' if finance.indicators.bepPct < 75 else 'Watch' }}
@@END_TABLE@@

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@<strong>Conclusion: financially feasible.</strong> Profitability is good, the payback period is reasonable, resilience is strong, and the required rate of return is met.
{% else %}
@@P@@<strong>Conclusion: financial feasibility is insufficient.</strong> Price, investment scale or operating cost should be optimized and the project re-evaluated.
{% endif %}

@@H3@@14.1.3 Social and environmental feasibility

@@P@@With a closed recirculating system achieving 85–95% water reuse, the project uses just 5–10% of the water of traditional flow-through farming, greatly reducing draw on natural resources. Wastewater is treated to standard before discharge, with almost no diffuse pollution, in line with green, high-quality development goals. In normal operation it creates direct jobs and supports upstream and downstream activity (feed, logistics, sales), contributing to the local economy and food-supply security.

@@P@@<strong>Conclusion: feasible on social and environmental grounds</strong>, in line with modern-fisheries and green-agriculture directions.

@@H2@@14.2 Key issues and recommendations

@@H3@@14.2.1 Price volatility is the largest risk

{% set top1 = finance.tables.sensitivity[0] %}
@@P@@The sensitivity analysis shows the project is most sensitive to <strong>{{ top1.label }}</strong>, with an IRR swing of {{ (top1.irrSwing*100)|round(1) }}%. {% if 'price' in top1.label or 'Sales' in top1.label %}If the actual price is 20% below expectation, the IRR falls from {{ (finance.indicators.irrTotal*100)|round(1) }}% to {{ (top1.irrLow*100)|round(1) }}%, potentially below the discount rate, leaving the project only marginally feasible.

@@P@@<strong>Recommendation</strong>: before execution, the owner should prioritize <strong>3–5 year supply agreements</strong> with core customers (supermarkets, restaurant chains, exporters), locking in base volume and a price floor to hedge market volatility. In parallel, pursue mid-to-high-end branding, raising unit price through organic certification, geographical indication and eco-label premiums.{% endif %}

@@H3@@14.2.2 Biofilter start-up is critical to delivery

@@P@@The biofilter (MBBR) needs a 4–8 week seeding period during which the nitrifier community establishes and TAN capacity rises from zero to the design value. Stocking to full load too soon causes a TAN spike and mass mortality.

@@P@@<strong>Recommendation</strong>: follow the start-up sequence strictly — "seed first → stock at low load → ramp gradually":

@@LIST@@
- Weeks 1–4: seed the empty system, dosing inoculum + NH₄Cl
- Weeks 4–6: considered mature once TAN < 0.5 and NO₂ < 0.3 hold for 3 days
- Weeks 6–8: stock 20–30% of capacity with juveniles
- Weeks 8–12: increase load 15–20% per week
- After week 12: full-load production
@@END_LIST@@

@@P@@This 12-week start-up is already built into the ramp assumption (Year 1 at {{ (finance.params.ramp1*100)|round(0) }}%), but there is a real temptation to rush in practice; the schedule must be respected.

@@H3@@14.2.3 N+1 redundancy on critical equipment must be delivered

@@P@@RAS places extreme demands on reliability: a main-pump failure can drop DO to lethal levels within 30 minutes; a biofilter-blower failure can collapse the nitrifier community in 2 hours; a 1-hour LOX interruption can directly kill fish. The design includes N+1 redundancy + automatic changeover, but this must be carried through into procurement — standby units should not be cut to save money.

@@P@@<strong>Recommendation</strong>: critical standby equipment list:

@@LIST@@
- Main recirculation pump: N+1, auto-changeover ≤ 30 s
- Biofilter Roots blower: N+1, changeover ≤ 60 s
- Drum filter: N+1 (already included)
- LOX station: dual tanks + backup supply
- Backup generator: 100% site load, 30 s auto-start
- UV lamps: 100% spare-lamp stock
@@END_LIST@@

@@H3@@14.2.4 Prioritize biosecurity

@@P@@A closed RAS is inherently fairly biosecure, but once a pathogen enters it spreads quickly through the loop. A full biosecurity SOP should be established:

@@LIST@@
- Intake water disinfected by UV at 60 mJ/cm² or ozone at 0.5 mg/L residual for 5 minutes
- Workers change into work clothes + boots and pass through a foot-disinfection bath
- Tools not shared between modules, color-coded
- New juveniles quarantined and observed for 2–4 weeks
- Sick fish isolated immediately; mortalities buried or incinerated
@@END_LIST@@

@@H3@@14.2.5 Strengthen workforce development

@@P@@RAS is technology-intensive, requiring staff with both aquaculture and water-treatment knowledge. The staffing plan should include at least 1–2 experienced RAS specialists (recruited from established operators or specifically trained), with other operators receiving systematic pre-job training (2–3 months recommended).

@@H2@@14.3 Overall recommendation

@@P@@Based on the analysis above, the preparer ({{ project.editor }}) makes the following overall recommendation:

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@<strong>1. Recommended to proceed.</strong> The project is technically mature, equipment-reliable, reasonably costed, financially feasible and sound in social/environmental terms, in line with modern-fisheries directions; the approval process should be advanced promptly.

@@P@@<strong>2. Implement the key risk controls:</strong>

@@LIST@@
- Sales: sign long-term supply agreements with core customers before execution, locking in 60–70% of capacity
- Engineering: build to N+1 redundancy without simplifying critical equipment
- Start-up: respect the 12-week sequence, avoiding a rush to full load
- Biosecurity: establish full SOPs — prevention over cure
- People: bring in 1–2 RAS specialists and provide systematic training
@@END_LIST@@

@@P@@<strong>3. Next steps:</strong>

@@LIST@@
- Commission a formal EIA from a qualified body
- Commission detailed engineering design (this study is budget-stage, ±40% accuracy)
- Run open enquiry/tender with vendors to lock in main-equipment contract prices
- Advance land approval, EIA sign-off and planning permits
- Establish the project delivery organization and control mechanisms
@@END_LIST@@

{% else %}
@@P@@<strong>1. Defer approval and optimize first.</strong> The project is technically feasible, but the financial indicators do not yet support an investment decision. Optimization should focus on:

@@LIST@@
- Raising the price: through branding, quality and differentiation (current price {{ finance.params.price }} EUR/kg)
- Reducing investment: simplify non-essential units and optimize equipment selection (current fixed-asset investment {{ capex.fixedAsset|wan }} EUR)
- Improving ramp efficiency: reach full capacity faster to reduce capital tied up during construction
- Seeking grants: modern-fisheries parks, agricultural-industrialization funds, etc.
- Optimizing the financing structure: a higher equity ratio / lower-rate loans
@@END_LIST@@

@@P@@<strong>2. Re-evaluate</strong>: after optimization, recompute the financial indicators in iRAS and proceed only if the IRR exceeds the discount rate and the NPV is positive.
{% endif %}

@@P@@— End of report —
</script>

                return;

              STATE.data = parsed;
              bootstrap();
            } catch (err) { alert('JSON parse failed: ' + err.message); }
          };
          reader.readAsText(file);
        });
      }
    }, 0);
    return;  // no data: stop, do not render the body
  }

  // meta-info row
  document.getElementById('metaLine').textContent =
    `${STATE.data.speciesName || STATE.data.species} · ${STATE.data.yieldTons} t/yr · ` +
    `Saved ${new Date(STATE.data.savedAt).toLocaleString('en-US')}`;

  // render the main content
  renderMain();
}

  bindActionButtons();

function renderForm() {
  let html = '<h2 style="margin-top: 24px;">📋 Project metadata</h2>';
  html += '<div style="font-size:11px; color:#94a3b8; margin-bottom:12px;">Fill in the project details. Fields marked <span style="color:#ef4444;">*</span> are required. This form is saved locally and restored next time.</div>';
  FORM_FIELDS.forEach(group => {
    const collapsed = group.collapsed ? 'collapsed' : '';
    html += `<div class="form-group ${collapsed}" data-group="${group.group}">
      <div class="form-group-header">
        <span class="form-group-title">${group.title}</span>
        <span><span class="form-group-status" data-group-status="${group.group}"></span><span class="form-group-toggle"></span></span>
      </div>
      <div class="form-group-body">`;
    group.fields.forEach(f => {
      const wide = f.wide ? 'field-wide' : '';
      const required = f.required ? '<span class="required">*</span>' : '';
      const hint = f.hint ? `<span class="hint">${f.hint}</span>` : '';
      const value = STATE.form[f.key] !== undefined ? String(STATE.form[f.key]).replace(/"/g,'&quot;') : '';
      let input;
      if (f.type === 'select') {
        const opts = (f.options || []).map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('');
        input = `<select id="f_${f.key}" data-key="${f.key}"><option value="">-- select --</option>${opts}</select>`;
      } else if (f.type === 'textarea') {
        input = `<textarea id="f_${f.key}" data-key="${f.key}" placeholder="${f.placeholder || ''}">${value}</textarea>`;
      } else {
        const type = f.type || 'text';
        input = `<input id="f_${f.key}" data-key="${f.key}" type="${type}" value="${value}" placeholder="${f.placeholder || ''}">`;
      }
      html += `<div class="field ${wide}">
        <label for="f_${f.key}">${f.label}${required}${hint}</label>
        ${input}
      </div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function renderActionBar() {
  return `<div class="action-bar">
    <button class="btn-primary" id="btnGenerate">📄 Generate Feasibility Report (.docx)</button>
    <div class="hint">The report is generated as a structured .docx document that you can use directly or paste into your own Word template.</div>

function bindFormEvents() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('input', (ev) => {
      const k = ev.target.dataset.key;
      let v = ev.target.value;
      if (ev.target.type === 'number') v = parseFloat(v) || null;
      STATE.form[k] = v;
      saveFormToStorage();
      updateGroupStatus();
    });
  });
  updateGroupStatus();
}

function updateGroupStatus() {
  FORM_FIELDS.forEach(group => {
    const total = group.fields.length;
    const filled = group.fields.filter(f => {
      const v = STATE.form[f.key];
      return v !== undefined && v !== null && v !== '';
    }).length;
    const el = document.querySelector(`[data-group-status="${group.group}"]`);
    if (el) {
      el.textContent = `${filled}/${total}`;
      el.className = 'form-group-status' + (filled === total ? ' complete' : '');
    }
  });
}

function bindGroupToggle() {
  document.querySelectorAll('.form-group-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('collapsed');
    });
  });
}

function bindActionButtons() {

// Escape XML special characters
function xmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

// Process-flow schematic (simplified P&ID, 800×500 view)
function buildProcessFlowSvg(ctx) {
  const wf = ctx.workflow || {};
  const f = ctx.farm || {};
  const W = 1200, H = 500;
  const boxW = 140, boxH = 60, gap = 30;

  // main-process nodes
  const main = [
    { tag: 'T-101', name: 'Fish tank', fill: '#dbeafe' },
    { tag: 'F-201', name: 'Drum filter', fill: '#fef3c7' },
    { tag: 'B-301', name: 'Biofilter', fill: '#d1fae5' },
    { tag: 'D-401', name: 'UV', fill: '#e0e7ff' },
    { tag: 'C-501', name: 'CO₂ stripper', fill: '#f3e8ff' },
    { tag: 'A-601', name: 'O₂ cone', fill: '#fce7f3' }
  ];

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="Helvetica, Arial, sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="#475569" stroke-width="1.5"/>
  </marker>
</defs>
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">${xmlEscape((f.speciesName || '') + ' ' + (f.yieldTons || 0) + ' t/yr process flow schematic')}</text>
<text x="${W/2}" y="52" text-anchor="middle" font-size="13" fill="#64748b">Design stage: ${xmlEscape(wf.designStageName || 'Market size')} | peak flow ${(f.peakFlowM3H || 0).toFixed(0)} m³/h | system volume ${(f.totalSystemVolume || 0).toFixed(0)} m³</text>`;

  // main-process boxes + connectors (centered)
  const mainY = 130;
  const totalMainW = main.length * boxW + (main.length - 1) * gap;
  const mainX0 = (W - totalMainW) / 2;
  main.forEach((node, i) => {
    const x = mainX0 + i * (boxW + gap);
    svg += `
<rect x="${x}" y="${mainY}" width="${boxW}" height="${boxH}" rx="4" fill="${node.fill}" stroke="#334155" stroke-width="1.5"/>
<text x="${x + boxW/2}" y="${mainY + 25}" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">${xmlEscape(node.tag)}</text>
<text x="${x + boxW/2}" y="${mainY + 45}" text-anchor="middle" font-size="13" fill="#334155">${xmlEscape(node.name)}</text>`;
    // connector (except the last)
    if (i < main.length - 1) {
      svg += `<line x1="${x + boxW}" y1="${mainY + boxH/2}" x2="${x + boxW + gap}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>`;
    }
  });

  // recirculation return to the fish tank
  const lastBox = mainX0 + (main.length - 1) * (boxW + gap) + boxW;
  const firstBox = mainX0;
  svg += `
<line x1="${lastBox}" y1="${mainY + boxH + 5}" x2="${lastBox}" y2="${mainY + boxH + 30}" stroke="#475569" stroke-width="2"/>
<line x1="${lastBox}" y1="${mainY + boxH + 30}" x2="${firstBox - 15}" y2="${mainY + boxH + 30}" stroke="#475569" stroke-width="2"/>
<line x1="${firstBox - 15}" y1="${mainY + boxH + 30}" x2="${firstBox - 15}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2"/>
<line x1="${firstBox - 15}" y1="${mainY + boxH/2}" x2="${firstBox}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<text x="${(lastBox + firstBox)/2}" y="${mainY + boxH + 50}" text-anchor="middle" font-size="11" fill="#64748b">Main loop ${(f.peakFlowM3H || 0).toFixed(0)} m³/h</text>`;

  // bypass units (enabled)
  const branches = [];

  if (wf.denitri && wf.denitri.enabled) branches.push({ tag: 'R-801', name: 'Denitrification', pct: (wf.denitri.flowPct||0).toFixed(0) + '%' });
  if (wf.aop     && wf.aop.enabled)     branches.push({ tag: 'X-901', name: 'AOP',      pct: (wf.aop.flowPct||0).toFixed(0) + '%' });

  const branchY = mainY + boxH + 90;
  if (branches.length > 0) {

    const bTotalW = branches.length * boxW + (branches.length - 1) * gap;

<text x="${tblX + 10}" y="${tblY + 18}" font-size="12" font-weight="bold" fill="#1e293b">Key process parameters</text>
<text x="${tblX + 10}" y="${tblY + 38}" font-size="11" fill="#475569">RDF: ${(wf.rdf && wf.rdf.tssEff || 0).toFixed(0)}% TSS, 60 μm screen</text>
<text x="${tblX + 10}" y="${tblY + 54}" font-size="11" fill="#475569">BF: ${(wf.bf && wf.bf.volume || 0).toFixed(0)} m³ media, ${(wf.bf && wf.bf.tanEff || 0).toFixed(0)}% TAN removal</text>
<text x="${tblX + 10}" y="${tblY + 70}" font-size="11" fill="#475569">UV: ${(wf.uv && wf.uv.dose || 0).toFixed(0)} mJ/cm², ${(wf.uv && wf.uv.powerKw || 0).toFixed(1)} kW</text>
<text x="${tblX + 10}" y="${tblY + 86}" font-size="11" fill="#475569">Oxygenation: ${wf.aerator && wf.aerator.enabled ? 'LOX + cone' : 'air aeration'}, peak ${(wf.aerator && wf.aerator.peakSupplyKgH || 0).toFixed(1)} kg O₂/h</text>`;

  svg += `\n</svg>`;
  return svg;
}

// Sensitivity tornado chart (from finance.tables.sensitivity)
function buildTornadoSvg(ctx) {
  const sens = (ctx.finance && ctx.finance.tables && ctx.finance.tables.sensitivity) || [];
  const baseIRR = (ctx.finance && ctx.finance.indicators && ctx.finance.indicators.irrTotal) || 0;
  const W = 800, H = 60 + sens.length * 50 + 60;
  const margin = { left: 130, right: 60, top: 70, bottom: 40 };
  const chartW = W - margin.left - margin.right;
  const barH = 28;
  const rowH = 50;

  // x-axis range
  let minIRR = baseIRR, maxIRR = baseIRR;
  sens.forEach(f => {
    minIRR = Math.min(minIRR, f.irrLow, f.irrHigh);
    maxIRR = Math.max(maxIRR, f.irrLow, f.irrHigh);
  });
  const range = maxIRR - minIRR || 0.01;
  minIRR -= range * 0.1; maxIRR += range * 0.1;
  const xScale = irr => margin.left + ((irr - minIRR) / (maxIRR - minIRR)) * chartW;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Sensitivity analysis — total-investment IRR tornado chart</text>
<text x="${W/2}" y="50" text-anchor="middle" font-size="13" fill="#64748b">Base IRR ${(baseIRR*100).toFixed(2)}% (dashed), each factor ±20% swing</text>`;

  // baseline
  const x0 = xScale(baseIRR);
  svg += `<line x1="${x0}" y1="${margin.top - 10}" x2="${x0}" y2="${H - margin.bottom + 5}" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  svg += `<text x="${x0}" y="${H - margin.bottom + 22}" text-anchor="middle" font-size="11" fill="#374151">base ${(baseIRR*100).toFixed(1)}%</text>`;

  // x-axis ticks
  for (let i = 0; i <= 5; i++) {
    const v = minIRR + (maxIRR - minIRR) * i / 5;
    const x = xScale(v);
    svg += `<line x1="${x}" y1="${H - margin.bottom}" x2="${x}" y2="${H - margin.bottom + 4}" stroke="#94a3b8"/>`;
    svg += `<text x="${x}" y="${H - margin.bottom + 18}" text-anchor="middle" font-size="10" fill="#64748b">${(v*100).toFixed(1)}%</text>`;
  }
  // x-axis line
  svg += `<line x1="${margin.left}" y1="${H - margin.bottom}" x2="${margin.left + chartW}" y2="${H - margin.bottom}" stroke="#94a3b8"/>`;

  // factor bars
  sens.forEach((f, i) => {
    const y = margin.top + i * rowH + (rowH - barH) / 2;
    const xLow = xScale(f.irrLow);
    const xHigh = xScale(f.irrHigh);
    const xLeft = Math.min(xLow, xHigh);
    const xRight = Math.max(xLow, xHigh);

    svg += `<rect x="${xLeft}" y="${y}" width="${xRight - xLeft}" height="${barH}" fill="#6366f1" opacity="0.85" stroke="#312e81" stroke-width="1"/>`;
    svg += `<text x="${margin.left - 10}" y="${y + barH/2 + 4}" text-anchor="end" font-size="12" fill="#1e293b" font-weight="bold">${xmlEscape(f.label)}</text>`;
    // endpoint values
    svg += `<text x="${xLeft - 4}" y="${y + barH/2 + 4}" text-anchor="end" font-size="10" fill="#475569">${(f.irrLow*100).toFixed(1)}%</text>`;
    svg += `<text x="${xRight + 4}" y="${y + barH/2 + 4}" text-anchor="start" font-size="10" fill="#475569">${(f.irrHigh*100).toFixed(1)}%</text>`;
    // swing value centered in the bar
    svg += `<text x="${(xLeft+xRight)/2}" y="${y + barH/2 + 4}" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">swing ${(f.irrSwing*100).toFixed(1)}%</text>`;
  });

  svg += `\n</svg>`;
  return svg;
}

// Cumulative cash-flow chart (total investment + equity, two lines)
function buildCashflowSvg(ctx) {
  const cf = (ctx.finance && ctx.finance.tables && ctx.finance.tables.cashflowTotal) || [];
  if (cf.length === 0) return '';
  const W = 800, H = 420;
  const margin = { left: 80, right: 60, top: 70, bottom: 60 };
  const chartW = W - margin.left - margin.right;
  const chartH = H - margin.top - margin.bottom;

  // data range (using cumTotal and cumEquity)
  let yMin = 0, yMax = 0;
  cf.forEach(p => {
    if (p.cumTotal != null) { yMin = Math.min(yMin, p.cumTotal); yMax = Math.max(yMax, p.cumTotal); }
    if (p.cumEquity != null) { yMin = Math.min(yMin, p.cumEquity); yMax = Math.max(yMax, p.cumEquity); }
  });
  const yRange = yMax - yMin || 1;
  yMin -= yRange * 0.1; yMax += yRange * 0.1;
  const xMax = cf[cf.length - 1].year;

  const xScale = t => margin.left + (t / xMax) * chartW;
  const yScale = v => margin.top + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Cumulative net cash flow</text>
<text x="${W/2}" y="50" text-anchor="middle" font-size="13" fill="#64748b">${ctx.farm.speciesName} ${ctx.farm.yieldTons} t/yr, project life ${cf.length - 1} yr</text>`;

  // x-axis
  for (let t = 0; t <= xMax; t += Math.max(1, Math.floor(xMax/8))) {
    const x = xScale(t);
    svg += `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${margin.top + chartH}" stroke="#e2e8f0"/>`;
    svg += `<text x="${x}" y="${margin.top + chartH + 18}" text-anchor="middle" font-size="10" fill="#64748b">Y${t}</text>`;
  }
  // y-axis (5 divisions)
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yMax - yMin) * i / 5;
    const y = yScale(v);
    svg += `<line x1="${margin.left}" y1="${y}" x2="${margin.left + chartW}" y2="${y}" stroke="#e2e8f0"/>`;
    svg += `<text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#64748b">${Math.round(v).toLocaleString('en-US')}</text>`;
  }
  svg += `<text x="${margin.left - 60}" y="${margin.top + chartH/2}" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90 ${margin.left - 60} ${margin.top + chartH/2})">Cumulative net cash flow (EUR)</text>`;

  // zero line
  if (yMin < 0 && yMax > 0) {
    const y0 = yScale(0);
    svg += `<line x1="${margin.left}" y1="${y0}" x2="${margin.left + chartW}" y2="${y0}" stroke="#374151" stroke-width="1.5"/>`;
  }

  // total-investment curve
  const totalPath = cf.map((p, i) => {
    const x = xScale(p.year);
    const y = yScale(p.cumTotal || 0);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');
  svg += `<path d="${totalPath}" fill="none" stroke="#dc2626" stroke-width="2.5"/>`;

  // equity curve
  const equityPath = cf.map((p, i) => {
    const x = xScale(p.year);
    const y = yScale(p.cumEquity || 0);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');
  svg += `<path d="${equityPath}" fill="none" stroke="#059669" stroke-width="2.5" stroke-dasharray="6 3"/>`;

  // data points
  cf.forEach(p => {
    if (p.year % 2 === 0 || p.year === xMax) {
      svg += `<circle cx="${xScale(p.year)}" cy="${yScale(p.cumTotal || 0)}" r="3" fill="#dc2626"/>`;
      svg += `<circle cx="${xScale(p.year)}" cy="${yScale(p.cumEquity || 0)}" r="3" fill="#059669"/>`;
    }
  });

  // legend
  const legendX = margin.left + 20;
  const legendY = margin.top + 15;
  svg += `<line x1="${legendX}" y1="${legendY}" x2="${legendX + 28}" y2="${legendY}" stroke="#dc2626" stroke-width="2.5"/>`;
  svg += `<text x="${legendX + 35}" y="${legendY + 4}" font-size="12" fill="#1e293b">Total investment</text>`;
  svg += `<line x1="${legendX + 90}" y1="${legendY}" x2="${legendX + 118}" y2="${legendY}" stroke="#059669" stroke-width="2.5" stroke-dasharray="6 3"/>`;
  svg += `<text x="${legendX + 125}" y="${legendY + 4}" font-size="12" fill="#1e293b">Equity</text>`;

  svg += `\n</svg>`;
  return svg;
}

// =============================================================================
//   SVG → PNG → Uint8Array (browser-side)
// =============================================================================

async function svgToPngBytes(svgString, width, height) {
  return new Promise((resolve, reject) => {
    try {
      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const dpr = 2; // high-resolution rendering
        const canvas = document.createElement('canvas');
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        URL.revokeObjectURL(url);
        canvas.toBlob(b => {
          if (!b) return reject(new Error('canvas.toBlob failed'));
          b.arrayBuffer().then(ab => resolve(new Uint8Array(ab)));
        }, 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('SVG load failed'));
      };
      img.src = url;
    } catch(e) { reject(e); }
  });
}

// =============================================================================
//   Context assembly — combine iRAS data + form data into the object the templates need
// =============================================================================

function buildContext() {
  const d = STATE.data;
  const f = STATE.form || {};
  const fin = d.results.summary.finance;

  // ------- project namespace -------
  const project = {
    name:                 f.projectName || '(project name not set)',
    code:                 f.projectCode || '',
    owner:                f.ownerName || '(owner not set)',
    ownerCreditCode:      f.ownerCreditCode || '',
    location: {
      province: f.locProvince || '',
      city:     f.locCity || '',
      district: f.locDistrict || '',
      address:  f.locAddress || '',
      full:     [f.locProvince, f.locCity, f.locDistrict, f.locAddress].filter(x => x).join(' ')
    },
    nature:               f.projectNature || 'New build',
    editor:               f.editorName || '(preparer not set)',
    editDate:             f.editDate || new Date().toISOString().slice(0,10),
    ownerLegalRep:        f.ownerLegalRep || '',
    ownerContact:         f.ownerContact || '',
    ownerPhone:           f.ownerPhone || '',
    ownerEstablishedDate: f.ownerEstablishedDate || '',
    ownerCapital:         f.ownerCapital || 0,
    ownerBusiness:        f.ownerBusiness || '',
    landArea:             f.landArea || 0,
    landNature:           f.landNature || '',
    landAcquisition:      f.landAcquisition || '',
    upperPlanName:        f.upperPlanName || '',
    editorQualification:  f.editorQualification || '',
    editorBasis:          f.editorBasis || ''
  };

  // ------- farm namespace -------
  const farm = {
    species:        d.species,
    speciesName:    d.speciesName,
    yieldTons:      d.yieldTons,
    stages:         (d.stages || []).map((s, i) => {
      const ps = (d.results.perStage || [])[i] || {};
      const psFlow = ps.flow || {};
      const psLoad = ps.load || {};
      const psFarm = ps.farm || {};
      // back out single-tank diameter: D = sqrt(4V / (π × H × tank count))
      const poolCount = (s.subSystemCount || 1) * (s.poolsPerSet || 1);
      const poolDepth = s.poolDepth_m || s.recDepth_m || 1.5;
      const totalVol  = psFarm.volume || 0;
      const D = (totalVol > 0 && poolDepth > 0 && poolCount > 0) ?
                Math.sqrt(4 * totalVol / poolCount / Math.PI / poolDepth) : 0;
      return {
        name:           s.name,
        weightStart:    s.weightStart,
        weightEnd:      s.weightEnd,
        months:         s.months,
        density:        s.density,
        tempOpt:        s.tempOpt,
        salinity:       s.salinity || 0,
        subSystemCount: s.subSystemCount || 1,
        poolsPerSet:    s.poolsPerSet || 1,
        poolCount:      poolCount,
        poolDepth_m:    poolDepth,
        poolDiameter:   Math.round(D * 10) / 10,
        biomass:        psFarm.biomass || 0,
        volume:         psFarm.volume || 0,
        volumeTotal:    psFlow.volumeTotal || psFarm.volume || 0,
        flowM3h:        psFlow.flowMain || 0,
        turnover:       psFlow.turnover || 0,
        feedDailyMax:   psLoad.feedMax || 0,
        feedDailyAvg:   psLoad.feedAvg || 0,
        tanDaily:       psLoad.tanDaily || 0,
        tssDaily:       psLoad.tssDaily || 0,
        domDaily:       psLoad.domDaily || 0,
        co2Daily:       psLoad.co2Daily || 0,
        o2DailyTotal:   psLoad.o2DailyTotal || 0,
        FCR:            s.FCR || 0,    // v1.5 Bug 30 fix: the field is FCR (uppercase), not fcr
        protein:        s.protein || 0,
        feedRate:       s.feedRate || 0,
        mortality:      s.mortality || 0
      };
    }),
    designStage:        d.results.summary.designStage || '',
    peakFlowM3H:        d.results.summary.peakFlowM3H || 0,
    totalSystemVolume:  d.results.summary.totalSystemVolume || 0,
    totalLOXKgD:        d.results.summary.totalLOXKgD || 0,
    // v1.6: LOX tank config (site-level, shared facility-wide); fall back if old data lacks siteEquipment
    oxygenTank: (function(){
      const s = d.results.summary;
      if (s && s.siteEquipment && s.siteEquipment.oxygenTank) return s.siteEquipment.oxygenTank;
      // fallback: old designs lack the siteEquipment field, default to 3t × 2 tanks
      return { size_t: 3, count: 2, storage_t: 6, reserveDays: 0, unitPrice: 100000, totalCapex: 200000 };
    })()
  };

  // accumulate facility totals
  farm.totalBiomass    = farm.stages.reduce((s, x) => s + (x.biomass || 0), 0);
  farm.totalVolumeTank = farm.stages.reduce((s, x) => s + (x.volume || 0), 0);
  farm.totalFeedDaily  = farm.stages.reduce((s, x) => s + (x.feedDailyMax || 0), 0);
  farm.totalMonths     = farm.stages.reduce((s, x) => s + (x.months || 0), 0);
  farm.totalSubSystems = farm.stages.reduce((s, x) => s + (x.subSystemCount || 0), 0);
  farm.totalPools      = farm.stages.reduce((s, x) => s + (x.poolCount || 0), 0);
  // v1.7: design-stage (max-capacity) system discharge — uses the real V_total × exchangeDaily instead of a hard-coded 7.5%
  //   rationale: each stage has a different exchange rate (market size 4%, fry 8–10%); the report uses the design-stage basis, consistent with CAPEX
  //   compat: when old P&ID data lacks a discharge field, fall back to a 7.5% estimate
  {
    const _designPs = (d.results.perStage || [])[d.results.summary.designStageIdx || (d.results.perStage || []).length - 1] || {};
    const _disch = _designPs.discharge;
    if (_disch && _disch.V_m3_d != null) {
      farm.dischargeM3D = _disch.V_m3_d;
      farm.dischargeTSS_mg_L = _disch.TSS_mg_L || 0;
      farm.dischargeTAN_mg_L = _disch.TAN_mg_L || 0;
      farm.dischargeNO3_mg_L = _disch.NO3_mg_L || 0;
    } else {
      // fallback: estimate old data at 7.5%/d (consistent with the historical basis)
      farm.dischargeM3D = farm.totalSystemVolume * 0.075;
      farm.dischargeTSS_mg_L = 0;
      farm.dischargeTAN_mg_L = 0;
      farm.dischargeNO3_mg_L = 0;
    }
    farm.dischargeM3Y = farm.dischargeM3D * 365;
  }
  // v1.5.1: facility weighted FCR (weighted by daily feed, reflecting average feed efficiency)
  //   stage FCR varies widely (fry 0.8–1.0, market size 1.2–1.4); feed-weighting avoids bias from small stages
  const _fcrWeightedSum = farm.stages.reduce((acc, x) => acc + (x.FCR || 0) * (x.feedDailyMax || 0), 0);
  farm.weightedFCR = farm.totalFeedDaily > 0 ? _fcrWeightedSum / farm.totalFeedDaily : 0;

  // v1.5: site-area estimate (passed in directly from buildPIDExport)
  farm.land = (d.results.summary && d.results.summary.land) || null;

  // ------- workflow namespace -------
  // process design — uses the design-stage (usually market size) parameters as representative
  const designIdx = d.results.summary.designStageIdx || (d.results.perStage || []).length - 1;
  const designStage = (d.results.perStage || [])[designIdx] || {};
  const designEq = designStage.equipment || {};
  const sample = (d.stages || [])[designIdx] || {};
  const sproc = sample.proc || {};
  const workflow = {
    designStageName: designStage.stageName || '',
    // mainline (in-series) units
    rdf: designEq.rdf || {},
    bf:  designEq.bf || {},
    uv:  designEq.uv || {},
    co2: designEq.co2 || {},
    aerator: designEq.o2cone || {},
    // v1.7: tank aeration blower K-101 (enabled only in air mode; enabled=false in o2 mode)
    tankAirBlower: designEq.tankAirBlower || {},
    // bypass units
    skimmer: designEq.skimmer || {},
    aop:     designEq.aop || {},
    denitri: designEq.denitri || {},
    sump:    designEq.sump || {},
    // feeding parameters (user-entered, shared across stages)
    peakFactor: sproc.peakFactor || 1.5,
    // per-stage process data (for the detailed tables)
    perStage: (d.results.perStage || []).map(ps => ({
      stageName: ps.stageName,
      flow: ps.flow || {},
      load: ps.load || {},
      bfVolume: (ps.equipment && ps.equipment.bf && ps.equipment.bf.volume) || 0,
      uvPowerKw: (ps.equipment && ps.equipment.uv && ps.equipment.uv.powerKw) || 0,
      totalPumpKw: (ps.pumps && ps.pumps.totalKw) || 0,
      o2DailyKgD: (ps.load && ps.load.o2DailyTotal) || 0,
      co2DailyKgD: (ps.load && ps.load.co2Daily) || 0
    })),
    // facility key-equipment summary (for Chapter 6, Equipment & Process Design)
    equipmentSummary: buildEquipmentSummary(d)
  };

  // ------- capex namespace -------
  // v1.5 audit round 3: after the Bug 2 fix, the equity/loan split is no longer totalInvestment × ownPct
  //   the loan covers fixed assets only; working capital is 100% self-funded. Split here too so the report template is correct.
  const _wc = (fin.annualOpex || 0) * 0.15;
  const _fa = fin.totalCapexProject || 0;
  const _ownPct = 0.3;  // kept consistent with finParams.ownPct; overridden by finParams below if needed
  const capex = {
    equipDirect:      fin.totalCapexEquip || 0,
    civilEtc:         (fin.totalCapexProject || 0) - (fin.totalCapexEquip || 0),
    fixedAsset:       _fa,
    workingCapital:   _wc,
    totalInvestment:  _fa + _wc,
    // v1.5 audit round 3: expose finance-core fields so the template uses these instead of totalInvestment × ownPct
    ownEquityFixed:   _fa * _ownPct,             // equity portion of fixed assets
    loan:             _fa * (1 - _ownPct),       // loan (covers fixed assets only)
    ownEquity:        _fa * _ownPct + _wc,        // total equity (incl. working capital)
    depYearsEquip:    d.depYearsEquip || 8,
    depYearsCivil:    d.depYearsCivil || 20,
    depAnnual:        fin.annualDep || 0
  };

  // ------- opex namespace -------
  const opex = {
    totalAnnual:    fin.annualCost || 0,
    totalExclDep:   fin.annualOpex || 0,
    costPerKg:      fin.costPerKg || 0,
    depPerKg:       fin.depPerKg || 0,
    opexPerKg:      fin.opexPerKg || 0
  };

  // ------- finance namespace -------
  // computed from default parameters + data (a later version may let the user adjust finance parameters in report.html)
  // v1.5 simplification: use default finance parameters (matching the finance.html defaults)
  const finParams = {
    price:       guessDefaultPrice(d.species),
    years:       15,
    ramp1:       0.3,
    ramp2:       0.7,
    ramp3:       1.0,
    buildYears:  1,
    workingCap:  0.15,
    ownPct:      0.3,
    loanRate:    0.05,
    loanMethod:  'equal_payment',
    loanYears:   8,
    discount:    0.08,
    taxRate:     0.25,
    salesTax:    0,
    repairRate:  0.02,
    adminRate:   0.03,
    laborCost:   estimateLaborCost(d.yieldTons)
  };
  const finCalc = calculateFinance(d, finParams);

  const finance = {
    params:     finParams,
    indicators: finCalc.indicators,
    tables:     finCalc.tables
  };

  // ------- meta namespace -------
  const meta = {
    generatedAt:     new Date().toISOString(),
    irasVersion:     d.irasVersion || '1.5',
    templateVersion: 'v1.5-alpha-1',
    reportNumber:    `iRAS-${d.species}-${d.yieldTons}t-${new Date().toISOString().slice(0,10).replace(/-/g,'')}`
  };

  return { project, workflow, farm, capex, opex, finance, meta };
}

function guessDefaultPrice(species) {
  // EUR/kg, ex-works (consistent with finance.html)
  const map = {
    salmon: 8, turbot: 11, grouper: 18, bass: 7,
    mandarin: 13, tilapia: 3, eel: 15, shrimp: 8
  };
  return map[species] || 7;
}
function estimateLaborCost(yieldTons) {
  // EUR/yr: 50,000 EUR/person/yr, staffed by scale (consistent with finance.html)
  if (yieldTons < 100) return 250000;     // 5 staff
  if (yieldTons < 300) return 500000;     // 10 staff
  if (yieldTons < 1000) return 1000000;   // 20 staff
  if (yieldTons < 3000) return 2000000;   // 40 staff
  return 3000000;                          // 60+ staff
}

// Facility equipment summary (used by Chapter 6, Equipment & Process Design)
// Returns an array: [{ category, tag, name, spec, qty, perStage: [{stage, qty, spec}] }]
function buildEquipmentSummary(d) {
  const stages = d.results.perStage || [];
  if (stages.length === 0) return [];

  // Aggregation rule: one row per equipment class, qty = per-stage subSystemCount × whether that stage uses it
  const list = [];
  const stageNames = stages.map(s => s.stageName);

  // helper: aggregate the same equipment across stages into one row
  function aggregate(category, getter, defaultName, specFmt) {
    const perStage = stages.map((ps, i) => {
      const item = getter(ps);
      const subSys = (d.stages[i] && d.stages[i].subSystemCount) || 1;
      const enabled = item && item.enabled !== false;
      return {
        stage: ps.stageName,
        qty: enabled ? subSys : 0,
        spec: enabled ? specFmt(item, ps) : '—',
        item: enabled ? item : null
      };
    });
    const totalQty = perStage.reduce((s, x) => s + x.qty, 0);
    if (totalQty > 0) {
      list.push({ category, tag: perStage.find(x => x.item)?.item?.tag || '', name: defaultName, perStage, totalQty });
    }
  }

  aggregate('Fish tank', ps => ({ enabled: true, tag: 'T-101' }), 'Fish tank (incl. N+1)',
    (it, ps) => `${ps.farm.volume.toFixed(0)} m³ × ${ps.farm.density} kg/m³`);

  aggregate('Drum filter', ps => ({ ...ps.equipment.rdf, enabled: true }), 'Drum filter (RDF)',
    (it, ps) => `${(it.flow || ps.flow.flowMain).toFixed(0)} m³/h, 60 μm screen, TSS ${(it.tssEff || 0).toFixed(0)}%`);

  aggregate('Biofilter', ps => ({ ...ps.equipment.bf, enabled: true }), 'Biofilter (MBBR)',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³ media, K1/K3, specific surface 500 m²/m³`);

  aggregate('UV reactor', ps => ({ ...ps.equipment.uv, enabled: true }), 'UV reactor',
    (it, ps) => `${(it.flow || ps.flow.flowMain).toFixed(0)} m³/h, ${it.dose || 30} mJ/cm², medium-pressure lamp`);

  aggregate('CO₂ stripper', ps => ps.equipment.co2 || {}, 'CO₂ stripper',
    (it, ps) => `counter-current, G:L=${it.gToL || 3}, single-pass removal ${(it.eff || 65).toFixed(0)}%`);

  aggregate('O₂ cone', ps => ps.equipment.o2cone || {}, 'Low-head oxygenator (LHO) + LOX station',
    (it, ps) => `O₂ supply ${(it.peakSupplyKgH || 0).toFixed(1)} kg/h, ${(it.satTarget || 140).toFixed(0)}% saturation`);

  aggregate('Protein skimmer', ps => ps.equipment.skimmer || {}, 'Protein skimmer',
    (it, ps) => `${(it.volume || 0).toFixed(1)} m³, bypass ${(it.flowPct || 0).toFixed(0)}%, ${it.mode === 'ozone' ? 'ozone+foam' : 'air foam'}`);

  aggregate('Denitrification reactor', ps => ps.equipment.denitri || {}, 'Denitrification reactor',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³, NO₃ removal ${(it.no3RemovedKgD || 0).toFixed(1)} kg/d`);

  aggregate('AOP reactor', ps => ps.equipment.aop || {}, 'Advanced-oxidation (AOP) reactor',
    (it, ps) => `${it.type || '—'}, bypass ${(it.flowPct || 0).toFixed(0)}%, geosmin ${(it.geosminEff || 0).toFixed(0)}%`);

  aggregate('Ozone generator', ps => {
    const og = ps.equipment.ozoneGen || {};
    return { ...og, enabled: og.totalKgD > 0 };
  }, 'Ozone generator',
    (it, ps) => `${(it.totalKgD || 0).toFixed(2)} kg/d, ${(it.powerKw || 0).toFixed(1)} kW`);

  aggregate('Biofilter blower', ps => ({ enabled: true, ...ps.equipment.bfBlower, tag: 'K-302' }), 'Biofilter Roots blower',
    (it, ps) => {
      const sp = it.spec || {};
      return `air flow ${(sp.flowM3h || 0).toFixed(0)} m³/h, ${(sp.powerKw || 0).toFixed(1)} kW`;
    });

  aggregate('Main pump', ps => ({ enabled: true, ...ps.pumps.main }), 'Main recirculation pump (with VFD)',
    (it, ps) => `${(it.flow || 0).toFixed(0)} m³/h, ${(it.kw || 0).toFixed(1)} kW, head ${it.headM || 12} m`);

  aggregate('Sump', ps => ps.equipment.sump || {}, 'Sump / buffer tank',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³, HRT ${(it.hrt_min || 0).toFixed(1)} min`);

  return list;
}


// =============================================================================
//   Financial calculation (v1.5: fully delegated to finance-core.js, Bug 6 fix)
//   Exposes calculateFinance(data, p); generates tables and indicators internally
// =============================================================================
function calculateFinance(data, p) {
  if (!window.iRASFinance) {
    console.error('finance-core.js not loaded; financial tables cannot be generated');
    return { indicators: {}, tables: {} };
  }
  const fin = data.results.summary.finance;
  if (!fin) return { indicators: {}, tables: {} };

  const core = window.iRASFinance.calculate(data, p);
  if (!core) return { indicators: {}, tables: {} };

  // adapt to the legacy tables output structure
  const yearly = core.yearly;
  const Y = p.years;
  const yieldKg = data.yieldTons * 1000;
  const sat = yearly[Math.min(3, Y)] || yearly[yearly.length - 1];
  const total = sat.opCostTotal + sat.dep + sat.interest;
  const pct = v => total > 0 ? (v / total * 100).toFixed(1) : '—';

  return {
    indicators: core.indicators,
    tables: {
      revenue: yearly.filter(y => y.year > 0).map(y => ({
        year: y.year, ramp: y.ramp,
        tons: yieldKg * y.ramp / 1000,
        revenue: y.revenue, salesTax: y.salesTax, netRevenue: y.netRevenue
      })),
      totalCost: {
        operatingCost: sat.operatingCost, operatingPct: pct(sat.operatingCost),
        repairCost:    sat.repairCost,    repairPct:    pct(sat.repairCost),
        adminCost:     sat.adminCost,     adminPct:     pct(sat.adminCost),
        laborCost:     sat.laborCost,     laborPct:     pct(sat.laborCost),
        dep:           sat.dep,           depPct:       pct(sat.dep),
        interest:      sat.interest,      interestPct:  pct(sat.interest),
        total,
        roi: total > 0 ? (sat.profitNet / (fin.totalCapexProject || 1) * 100) : 0
      },
      profitLoss: {
        y1: yearly[1] || {}, y2: yearly[2] || {}, y3: yearly[3] || {}, yN: yearly[Y] || {}
      },
      cashflowTotal: yearly,
      cashflowEquity: yearly,
      sensitivity: core.sensitivity ? core.sensitivity.factors : []
    }
  };
}


// =============================================================================
//   nunjucks template rendering
// =============================================================================

let nunjucksEnv = null;

function setupNunjucks() {
  if (nunjucksEnv) return nunjucksEnv;
  nunjucksEnv = new nunjucks.Environment(null, { autoescape: false });
  // custom filters
  nunjucksEnv.addFilter('wan', v => isFinite(v) ? Math.round(v).toLocaleString('en-US') : '—');
  nunjucksEnv.addFilter('eur', v => isFinite(v) ? Math.round(v).toLocaleString('en-US') : '—');
  nunjucksEnv.addFilter('pct', v => isFinite(v) ? (v * 100).toFixed(2) + '%' : '—');
  nunjucksEnv.addFilter('thousand', v => isFinite(v) ? v.toLocaleString('zh-CN') : '—');
  nunjucksEnv.addFilter('round', (v, d) => isFinite(v) ? Number(v).toFixed(d != null ? d : 0) : '—');
  return nunjucksEnv;
}

function getTemplate(id) {
  const el = document.getElementById('tpl-' + id);
  return el ? el.textContent : '';
}

function renderChapter(chapterId, ctx) {
  const tpl = getTemplate(chapterId);
  if (!tpl) return '@@H1@@(chapter template missing: ' + chapterId + ')\n';
  try {
    return nunjucksEnv.renderString(tpl, ctx);
  } catch(e) {
    console.error('chapter render failed ' + chapterId + ':', e);
    return '@@H1@@(chapter render failed: ' + chapterId + ')\n@@P@@Error: ' + e.message + '\n';
  }
}

// =============================================================================
//   Generate the feasibility report (main entry)
// =============================================================================

async function generateReport() {
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  setStatus('① Assembling the data context…');

  try {
    // 1. build context
    setupNunjucks();
    STATE.context = buildContext();

    // 2. render all chapters
    setStatus('② Rendering chapter templates…');
    const chapters = [];
    for (const ch of CHAPTERS) {
      const text = renderChapter(ch.id, STATE.context);
      chapters.push({ ...ch, text });
    }

    // 3. load docx.js (lazy)
    setStatus('③ Loading the docx library…');
    await loadDocxLibrary();

    // 4. generate docx (with pre-rendered images)
    setStatus('④ Rendering charts + assembling the docx…');
    const blob = await buildDocxBlob(chapters, STATE.context);

    // 5. download
    setStatus('⑤ Downloading the file…');
    const fname = `iRAS_feasibility-report_${STATE.data.species}_${STATE.data.yieldTons}t_${new Date().toISOString().slice(0,10)}.docx`;
    triggerDownload(blob, fname);

    setStatus(`✅ Report generated: ${fname}`, 'success');
  } catch(e) {
    console.error('report generation failed:', e);
    setStatus('❌ Generation failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// lazy-load docx.js
let _docxLib = null;
async function loadDocxLibrary() {
  if (_docxLib) return _docxLib;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('docx.js failed to load (network issue or CDN unreachable)'));
    document.head.appendChild(s);
  });
  if (typeof docx === 'undefined') throw new Error('the docx global was not injected');
  _docxLib = docx;
  return _docxLib;
}

// Parse the rendered text into a docx children array
function parseTextToDocxChildren(text, dx, images) {
  const { Paragraph, HeadingLevel, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle, ImageRun } = dx;
  images = images || {};

  // split text containing <strong>...</strong> into TextRun arrays (bold + normal fragments)
  function inlineRuns(s, baseOpts) {
    baseOpts = baseOpts || { size: 21, font: 'Times New Roman' };
    const runs = [];
    const re = /<strong>(.*?)<\/strong>/g;
    let last = 0, m;
    while ((m = re.exec(s)) !== null) {
      if (m.index > last) {
        runs.push(new TextRun({ ...baseOpts, text: s.slice(last, m.index) }));
      }
      runs.push(new TextRun({ ...baseOpts, text: m[1], bold: true }));
      last = m.index + m[0].length;
    }
    if (last < s.length) {
      runs.push(new TextRun({ ...baseOpts, text: s.slice(last) }));
    }
    return runs.length > 0 ? runs : [new TextRun({ ...baseOpts, text: s })];
  }
  const lines = text.split('\n');
  const children = [];
  let i = 0;
  while (i < lines.length) {
    let line = lines[i];
    if (!line.trim()) { i++; continue; }

    // table
    if (line.includes('@@TABLE@@')) {
      const rows = [];
      i++;
      while (i < lines.length && !lines[i].includes('@@END_TABLE@@')) {
        const row = lines[i].trim();
        if (row && !row.startsWith('@@SUBTOTAL@@')) {
          rows.push({ cells: row.split('|'), subtotal: false });
        } else if (row.startsWith('@@SUBTOTAL@@')) {
          rows.push({ cells: row.replace('@@SUBTOTAL@@','').split('|'), subtotal: true });
        }
        i++;
      }
      i++; // skip END_TABLE
      if (rows.length > 0) {
        const tableRows = rows.map((r, idx) => new TableRow({
          children: r.cells.map(c => new TableCell({
            children: [new Paragraph({
              children: inlineRuns(c.trim(), { size: 18, font: 'Times New Roman', bold: idx === 0 || r.subtotal }),
              alignment: idx === 0 ? AlignmentType.CENTER : AlignmentType.LEFT
            })],
            shading: idx === 0 ? { fill: 'E0E7FF' } : (r.subtotal ? { fill: 'F1F5F9' } : undefined)
          }))
        }));
        children.push(new Table({
          rows: tableRows,
          width: { size: 100, type: WidthType.PERCENTAGE }
        }));
        children.push(new Paragraph({ children: [new TextRun(' ')] })); // blank line after the table
      }
      continue;
    }

    // list
    if (line.includes('@@LIST@@')) {
      i++;
      while (i < lines.length && !lines[i].includes('@@END_LIST@@')) {
        const t = lines[i].trim();
        if (t && t.startsWith('-')) {
          children.push(new Paragraph({
            children: inlineRuns(t.replace(/^-\s*/, ''), { size: 21, font: 'Times New Roman' }),
            bullet: { level: 0 }
          }));
        }
        i++;
      }
      i++;
      continue;
    }

    // image @@IMG@@id=xxx|caption=xxx|w=800|h=400@@
    const imgMatch = line.match(/@@IMG@@([^@]*)@@/);
    if (imgMatch) {
      const params = {};
      imgMatch[1].split('|').forEach(kv => {
        const [k, v] = kv.split('=');
        if (k && v != null) params[k.trim()] = v.trim();
      });
      const id = params.id;
      const caption = params.caption || '';
      const dispW = parseInt(params.w) || 600;
      const dispH = parseInt(params.h) || 300;
      const png = images[id];
      if (png && png.length > 0 && ImageRun) {
        try {
          children.push(new Paragraph({
            children: [new ImageRun({
              data: png,
              transformation: { width: dispW, height: dispH },
              type: 'png'
            })],
            alignment: AlignmentType.CENTER,
            spacing: { before: 200, after: 100 }
          }));
          if (caption) {
            children.push(new Paragraph({
              children: [new TextRun({ text: caption, size: 18, italics: true, color: '6B7280', font: 'Times New Roman' })],
              alignment: AlignmentType.CENTER,
              spacing: { after: 200 }
            }));
          }
        } catch(e) {
          // fall back to a text note if rendering fails
          children.push(new Paragraph({
            children: [new TextRun({ text: '[image render failed: ' + id + ']', size: 21, color: 'DC2626' })],
            alignment: AlignmentType.CENTER
          }));
        }
      } else {
        // fall back to a text placeholder if the image is unavailable
        children.push(new Paragraph({
          children: [new TextRun({ text: '[' + (caption || 'figure: ' + id) + ' — not generated]', size: 21, italics: true, color: '94A3B8' })],
          alignment: AlignmentType.CENTER
        }));
      }
      i++; continue;
    }

    // heading H1
    const h1Match = line.match(/@@H1@@(.*)/);
    if (h1Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h1Match[1].trim(), bold: true, size: 32, font: 'Arial' })],
        heading: HeadingLevel.HEADING_1,
        spacing: { before: 400, after: 200 }
      }));
      i++; continue;
    }
    // H2
    const h2Match = line.match(/@@H2@@(.*)/);
    if (h2Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h2Match[1].trim(), bold: true, size: 26, font: 'Arial' })],
        heading: HeadingLevel.HEADING_2,
        spacing: { before: 300, after: 150 }
      }));
      i++; continue;
    }
    // H3
    const h3Match = line.match(/@@H3@@(.*)/);
    if (h3Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h3Match[1].trim(), bold: true, size: 22, font: 'Arial' })],
        heading: HeadingLevel.HEADING_3,
        spacing: { before: 250, after: 120 }
      }));
      i++; continue;
    }
    // paragraph P (explicit or implicit)
    let paraText = line;
    const pMatch = line.match(/@@P@@(.*)/);
    if (pMatch) paraText = pMatch[1];
    // default body text
    children.push(new Paragraph({
      children: inlineRuns(paraText.trim(), { size: 21, font: 'Times New Roman' }),
      spacing: { line: 360, after: 100 },
      indent: { firstLine: 420 }  // first-line indent
    }));
    i++;
  }
  return children;
}

// Pre-render all SVG charts to PNG (async, browser-side)
// Returns PNG Uint8Arrays for { processFlow, tornado, cashflow }
async function preRenderImages(ctx) {
  const images = {};
  // 1. process-flow schematic
  try {
    const svg1 = buildProcessFlowSvg(ctx);
    images.processFlow = await svgToPngBytes(svg1, 1200, 500);
  } catch(e) {
    console.warn('processFlow render failed:', e); images.processFlow = null;
  }
  // 2. Tornado
  try {
    const sens = (ctx.finance && ctx.finance.tables && ctx.finance.tables.sensitivity) || [];
    if (sens.length > 0) {
      const svg2 = buildTornadoSvg(ctx);
      const tornadoH = 60 + sens.length * 50 + 60;
      images.tornado = await svgToPngBytes(svg2, 800, tornadoH);
    }
  } catch(e) {
    console.warn('tornado render failed:', e); images.tornado = null;
  }
  // 3. cumulative cash flow
  try {
    const cf = (ctx.finance && ctx.finance.tables && ctx.finance.tables.cashflowTotal) || [];
    if (cf.length > 0) {
      const svg3 = buildCashflowSvg(ctx);
      images.cashflow = await svgToPngBytes(svg3, 800, 420);
    }
  } catch(e) {
    console.warn('cashflow render failed:', e); images.cashflow = null;
  }
  return images;
}

// Assemble the docx Blob
async function buildDocxBlob(chapters, ctx) {
  const dx = await loadDocxLibrary();
  const { Document, Packer, Paragraph, TextRun, AlignmentType, PageBreak } = dx;

  // pre-render all images to PNG
  const images = await preRenderImages(ctx);

  const allChildren = [];

  // cover page
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.name, bold: true, size: 56, font: 'Arial' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 4000, after: 800 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: 'Feasibility Study', bold: true, size: 40 })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 400 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.owner, size: 28, font: 'Times New Roman' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 800, after: 200 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.editor + ' · ' + ctx.project.editDate, size: 24, font: 'Times New Roman' })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 200 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: 'Generated automatically by iRAS v' + ctx.meta.irasVersion, size: 18, italics: true, color: '6B7280' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 4000 },
    pageBreakBefore: false
  }));
  allChildren.push(new Paragraph({ children: [new PageBreak()] }));

  // chapters
  chapters.forEach((ch, idx) => {
    const childrenOfChapter = parseTextToDocxChildren(ch.text, dx, images);
    childrenOfChapter.forEach(c => allChildren.push(c));
    if (idx < chapters.length - 1) {
      allChildren.push(new Paragraph({ children: [new PageBreak()] }));
    }
  });

  const doc = new Document({
    creator: 'iRAS v' + ctx.meta.irasVersion,
    title: ctx.project.name + ' - Feasibility Study',
    description: 'Feasibility study generated automatically by iRAS',
    styles: {
      default: {
        document: {
          run: { font: 'Times New Roman', size: 21 }
        }
      }
    },
    sections: [{
      properties: {
        page: {
          margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }  // 1 inch = 1440 twip
        }
      },
      children: allChildren
    }]
  });

  return await Packer.toBlob(doc);
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// =============================================================================
//   Event binding
// =============================================================================

document.addEventListener('DOMContentLoaded', () => {
  if (tryLoadData()) {
    bootstrap();
  } else {
    // no data: bootstrap shows the empty state
    loadFormFromStorage();
    bootstrap();
  }

  // v1.5 Bug 37: global drag-and-drop JSON loading
  document.body.addEventListener('dragover', (e) => { e.preventDefault(); });
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.pidSchema && !(parsed.results && parsed.results.summary && parsed.results.summary.finance)) {
          alert('Unrecognized JSON format. Please confirm this is the "report data" backup downloaded from the main page, not the raw "saved design" JSON.');
          return;
        }
        STATE.data = parsed;
        bootstrap();
      } catch (err) { alert('JSON parse failed: ' + err.message); }
    };
    reader.readAsText(file);
  });

  // top-bar buttons
  document.getElementById('btnReloadData').addEventListener('click', () => {
    if (tryLoadData()) {
      bootstrap();
      setStatus('Data reloaded', 'success');
    } else {
      setStatus('No design data found; click 📄 Generate Feasibility Report again on the main page', 'error');
    }
  });

  document.getElementById('btnClearForm').addEventListener('click', () => {
    if (confirm('Clear all form fields?')) {
      STATE.form = {};
      saveFormToStorage();
      bootstrap();  // re-render
    }
  });

  // postMessage listener (main page clicks again → notify to refresh)
  window.addEventListener('message', (ev) => {
    if (ev && ev.data && ev.data.type === 'iRAS_REPORT_RELOAD') {
      tryLoadData();
      bootstrap();
    }
  });
});
