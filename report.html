@@H1@@Chapter 12. Financial Analysis

@@H2@@12.1 Basis of the financial evaluation

The financial evaluation follows standard project economic-evaluation methodology and current tax and fiscal rules to assess the financial feasibility of the project.

The evaluation uses discounted cash-flow analysis to compute financial indicators at both the total-investment and equity levels, including the internal rate of return (IRR), net present value (NPV), payback period and break-even point, together with a sensitivity analysis of the main uncertainties.

@@H2@@12.2 Input data and parameters

The base data and calculation parameters are as follows:

@@TABLE@@
Item|Value
Evaluation period|{{ finance.params.years }} years (construction {{ finance.params.buildYears }} years, then operation)
Product sales price|{{ finance.params.price }} EUR/kg
Design annual output|{{ farm.yieldTons }} t/yr
Production ramp|Year 1 {{ (finance.params.ramp1*100)|round(0) }}%, Year 2 {{ (finance.params.ramp2*100)|round(0) }}%, Year 3+ {{ (finance.params.ramp3*100)|round(0) }}% of capacity
Equity ratio|{{ (finance.params.ownPct*100)|round(0) }}%
Bank loan rate|{{ (finance.params.loanRate*100)|round(1) }}%/yr (repayment {{ finance.params.loanYears }} years)
Discount rate|{{ (finance.params.discount*100)|round(1) }}%
Income tax rate|{{ (finance.params.taxRate*100)|round(0) }}%
@@END_TABLE@@

@@H2@@12.3 Sales revenue and sales taxes

At the design capacity of {{ farm.yieldTons }} t/yr and a price of {{ finance.params.price }} EUR/kg, full-capacity annual revenue is about {{ (farm.yieldTons * 1000 * finance.params.price)|eur }} EUR. Revenue grows year by year with the capacity ramp, as shown below:

@@TABLE@@
Year|Capacity ratio|Output (t)|Revenue (EUR)
{% for y in finance.tables.revenue %}Year {{ y.year }}|{{ (y.ramp*100)|round(0) }}%|{{ y.tons|round(1) }}|{{ y.revenue|wan }}
{% endfor %}@@END_TABLE@@

{% if finance.params.salesTax > 0 %}
Sales tax and surcharge are levied at {{ (finance.params.salesTax*100)|round(1) }}%.
{% else %}
As a primary agricultural product, the output is exempt from VAT under current tax law, so the sales tax and surcharge are zero.
{% endif %}

@@H2@@12.4 Total cost estimate

The full-capacity total cost breaks down as follows:

@@TABLE@@
Item|Amount (EUR)|% of total cost
Operating cost (feed / power / LOX / chemicals)|{{ finance.tables.totalCost.operatingCost|wan }}|{{ finance.tables.totalCost.operatingPct }}%
Repairs ({{ (finance.params.repairRate*100)|round(1) }}% × equipment cost)|{{ finance.tables.totalCost.repairCost|wan }}|{{ finance.tables.totalCost.repairPct }}%
Admin ({{ (finance.params.adminRate*100)|round(1) }}% × revenue)|{{ finance.tables.totalCost.adminCost|wan }}|{{ finance.tables.totalCost.adminPct }}%
Labor|{{ finance.tables.totalCost.laborCost|wan }}|{{ finance.tables.totalCost.laborPct }}%
Depreciation (equipment {{ capex.depYearsEquip }} yr + civil works {{ capex.depYearsCivil }} yr)|{{ finance.tables.totalCost.dep|wan }}|{{ finance.tables.totalCost.depPct }}%
Finance cost (loan interest)|{{ finance.tables.totalCost.interest|wan }}|{{ finance.tables.totalCost.interestPct }}%
@@SUBTOTAL@@Total cost|{{ finance.tables.totalCost.total|wan }}|100.0%
@@END_TABLE@@

@@H2@@12.5 Profit & loss analysis

The profit & loss analysis covers the {{ finance.params.years }}-year evaluation period; the main figures for the key years (Year 1, Year 2, full-capacity year, final year) are:

@@TABLE@@
Item (EUR)|Year 1|Year 2|Full year (Year 3)|Final year (Year {{ finance.params.years }})
Sales revenue|{{ finance.tables.profitLoss.y1.revenue|wan }}|{{ finance.tables.profitLoss.y2.revenue|wan }}|{{ finance.tables.profitLoss.y3.revenue|wan }}|{{ finance.tables.profitLoss.yN.revenue|wan }}
Operating cost|{{ finance.tables.profitLoss.y1.opCost|wan }}|{{ finance.tables.profitLoss.y2.opCost|wan }}|{{ finance.tables.profitLoss.y3.opCost|wan }}|{{ finance.tables.profitLoss.yN.opCost|wan }}
Depreciation|{{ finance.tables.profitLoss.y1.dep|wan }}|{{ finance.tables.profitLoss.y2.dep|wan }}|{{ finance.tables.profitLoss.y3.dep|wan }}|{{ finance.tables.profitLoss.yN.dep|wan }}
Interest|{{ finance.tables.profitLoss.y1.interest|wan }}|{{ finance.tables.profitLoss.y2.interest|wan }}|{{ finance.tables.profitLoss.y3.interest|wan }}|{{ finance.tables.profitLoss.yN.interest|wan }}
Pre-tax profit|{{ finance.tables.profitLoss.y1.profitBefore|wan }}|{{ finance.tables.profitLoss.y2.profitBefore|wan }}|{{ finance.tables.profitLoss.y3.profitBefore|wan }}|{{ finance.tables.profitLoss.yN.profitBefore|wan }}
Income tax|{{ finance.tables.profitLoss.y1.tax|wan }}|{{ finance.tables.profitLoss.y2.tax|wan }}|{{ finance.tables.profitLoss.y3.tax|wan }}|{{ finance.tables.profitLoss.yN.tax|wan }}
@@SUBTOTAL@@Net profit|{{ finance.tables.profitLoss.y1.profitNet|wan }}|{{ finance.tables.profitLoss.y2.profitNet|wan }}|{{ finance.tables.profitLoss.y3.profitNet|wan }}|{{ finance.tables.profitLoss.yN.profitNet|wan }}

@@H2@@12.6 Cash-flow analysis

@@H3@@12.6.1 Total-investment cash flow

The total-investment cash flow evaluates the return on the project itself, before financing. The results are:

@@P@@Total-investment IRR (after tax) = {{ (finance.indicators.irrTotal*100)|round(2) }}%
@@P@@Total-investment NPV @ {{ (finance.params.discount*100)|round(1) }}% = {{ finance.indicators.npvTotal|wan }} EUR

{% if finance.indicators.irrTotal > finance.params.discount %}
The total-investment IRR exceeds the discount rate of {{ (finance.params.discount*100)|round(1) }}% and the NPV is positive, indicating the project is financially feasible on an investment basis.
{% else %}
The total-investment IRR is below the discount rate of {{ (finance.params.discount*100)|round(1) }}% and the NPV is negative, indicating insufficient feasibility on an investment basis; price, cost or investment scale should be optimized.
{% endif %}

@@IMG@@id=cashflow|caption=Figure 12-1 Cumulative net cash flow (solid: total investment; dashed: equity)|w=560|h=290@@

@@H3@@12.6.2 Equity cash flow

The equity cash flow evaluates the project from the shareholders' perspective, accounting for loan leverage. The results are:

@@P@@Equity IRR = {{ (finance.indicators.irrEquity*100)|round(2) }}%
@@P@@Equity NPV @ {{ (finance.params.discount*100)|round(1) }}% = {{ finance.indicators.npvEquity|wan }} EUR

{% if finance.params.ownPct < 1.0 %}
The equity IRR is {{ ((finance.indicators.irrEquity - finance.indicators.irrTotal)*100)|round(2) }} percentage points higher than the total-investment IRR, reflecting the amplifying effect of loan leverage.{% if finance.indicators.irrEquity > finance.params.discount %} Shareholder returns are healthy.{% endif %}
{% else %}
The project is financed entirely from equity, with no loan leverage, so the equity IRR equals the total-investment IRR.
{% endif %}

@@H2@@12.7 Static indicators

The static evaluation indicators are:

@@TABLE@@
Indicator|Value|Benchmark|Result
Total-investment static payback|{{ finance.indicators.paybackTotal|round(2) }} yr|≤ benchmark (8 yr)|{{ 'Met' if finance.indicators.paybackTotal <= 8 else 'Watch' }}
Equity static payback|{{ finance.indicators.paybackEquity|round(2) }} yr|—|—
Return on total investment (full year)|{{ finance.tables.totalCost.roi|round(2) }}%|—|—
@@END_TABLE@@

@@H2@@12.8 Dynamic indicators

@@TABLE@@
Indicator|Value|Benchmark|Result
Total-investment after-tax IRR|{{ (finance.indicators.irrTotal*100)|round(2) }}%|≥ {{ (finance.params.discount*100)|round(1) }}%|{{ 'Met' if finance.indicators.irrTotal >= finance.params.discount else 'Not met' }}
Equity IRR|{{ (finance.indicators.irrEquity*100)|round(2) }}%|—|—
Total-investment NPV|{{ finance.indicators.npvTotal|wan }} EUR|≥ 0|{{ 'Met' if finance.indicators.npvTotal >= 0 else 'Not met' }}
Total-investment dynamic payback|{{ finance.indicators.paybackTotalDisc|round(2) }} yr|—|—
@@END_TABLE@@

@@H2@@12.9 Break-even analysis

The break-even point (BEP) = {{ finance.indicators.bepPct|round(1) }}% of full capacity.

{% if finance.indicators.bepPct < 60 %}
This is well below the design capacity (BEP < 60%), giving a large safety margin: the project breaks even even if actual output is well below design, indicating strong resilience.
{% elif finance.indicators.bepPct < 75 %}
This falls in the 60–75% range, giving a moderate safety margin: the project breaks even within a reasonable output swing.
{% elif finance.indicators.bepPct < 90 %}
This is on the high side (75–90%): the project depends heavily on reaching target output and must operate near design to break even; production management and sales should be strengthened.
{% else %}
This is too high (≥ 90%): the project has almost no safety margin and any shortfall causes a loss; the risk is high and feasibility should be reassessed.
{% endif %}

@@H2@@12.10 Financial conclusion

In summary, the project's main financial indicators are:

@@TABLE@@
Indicator|Value|Result
Total-investment IRR (after tax)|{{ (finance.indicators.irrTotal*100)|round(2) }}%|{{ 'Feasible' if finance.indicators.irrTotal >= finance.params.discount else 'Not feasible' }}
Equity IRR|{{ (finance.indicators.irrEquity*100)|round(2) }}%|—
Total-investment NPV|{{ finance.indicators.npvTotal|wan }} EUR|{{ 'Feasible' if finance.indicators.npvTotal >= 0 else 'Not feasible' }}
Static payback|{{ finance.indicators.paybackTotal|round(2) }} yr|{{ 'Met' if finance.indicators.paybackTotal <= 8 else 'Watch' }}
Break-even point|{{ finance.indicators.bepPct|round(1) }}% of capacity|{{ 'Large margin' if finance.indicators.bepPct < 75 else 'Watch' }}
@@END_TABLE@@

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@Conclusion: the project's financial indicators are sound overall — the total-investment IRR exceeds the discount rate, the NPV is positive, the payback period is reasonable, and the break-even point {% if finance.indicators.bepPct < 75 %}leaves a comfortable safety margin{% else %}is within a manageable range{% endif %}. On a financial-feasibility basis, the project is suitable for investment.
{% else %}
@@P@@Conclusion: the project's financial indicators are weak and do not meet the required rate of return. The following should be optimized and the project re-evaluated:
@@LIST@@
{% if finance.params.price < 50 %}- Raise pricing or add higher-value product lines{% endif %}
- Optimize equipment investment (current CAPEX {{ capex.fixedAsset|wan }} EUR)
- Reduce operating cost (current annual OPEX {{ opex.totalExclDep|wan }} EUR)
- Adjust scale (currently {{ farm.yieldTons }} t/yr)
@@END_LIST@@
{% endif %}

{% endfor %}@@END_TABLE@@

@@H2@@1.3 Guiding principles

This report follows these principles:

@@LIST@@
- <strong>Sound engineering</strong>: the process design is based on a mature international RAS framework, with key parameters (mass balance, equipment selection, heat balance) calibrated against published literature and field data
- <strong>State of the art</strong>: a hybrid series-mainline + parallel-bypass architecture with multiple parallel modules and N+1 redundancy balances advanced technology with reliability
- <strong>Cost-effectiveness</strong>: the investment estimate considers sourcing, scale factors and regional factors to keep the budget realistic
- <strong>Practicality</strong>: equipment selection considers supply-chain maturity and the schedule follows industry norms, so the project can be delivered smoothly
- <strong>Compliance</strong>: the report is complete in structure and emphasizes the core content — technical concept, investment estimate, financial analysis and risk
@@END_LIST@@

@@H2@@1.4 Scope

This study examines the feasibility of {{ project.name }}, covering:

@@LIST@@
- Background and rationale
- Market analysis and scale
- Site and conditions
- Technical concept (process flow, unit design, key water-quality control)
- Equipment design (equipment list, specifications, procurement strategy)
- Civil works / site layout / utilities
- Energy and water efficiency
- Preliminary environmental impact
- Occupational safety, health and fire protection
- Implementation schedule and organization
- Investment estimate and financing
- Financial analysis (NPV / IRR / sensitivity)
- Risk analysis and mitigation
- Conclusion and recommendation

@@END_LIST@@

@@P@@This report does not replace formal environmental, safety or energy assessments, which must be issued independently by qualified bodies. The investment estimate has an accuracy of about ±40%; the detailed figure is governed by the construction contract.

@@H2@@1.6 Main conclusions and recommendations

@@H3@@1.6.1 Technology

@@P@@The project uses a mature international RAS process. The mainline runs "fish tank → drum filter → protein skimmer (bypass) → biofilter → UV → CO₂ stripping → oxygenation → fish tank", with denitrification and AOP bypasses. Unit design parameters align with international field data, so the process is <strong>mature and reliable</strong>.

@@H3@@1.6.2 Economics and finance

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@The financial indicators are sound. The total-investment IRR is <strong>{{ (finance.indicators.irrTotal*100)|round(2) }}%</strong>, above the discount rate of {{ (finance.params.discount*100)|round(1) }}%; the equity IRR is {{ (finance.indicators.irrEquity*100)|round(2) }}%; the NPV is positive at {{ finance.indicators.npvTotal|wan }} EUR; the static payback is {{ finance.indicators.paybackTotal|round(2) }} years and the dynamic payback {{ finance.indicators.paybackTotalDisc|round(2) }} years; the break-even point is {{ finance.indicators.bepPct|round(1) }}% of capacity. The project is <strong>financially feasible</strong>.
{% else %}
@@P@@The financial indicators are weak. The total-investment IRR is {{ (finance.indicators.irrTotal*100)|round(2) }}%, {% if finance.indicators.irrTotal < finance.params.discount %}below the discount rate of {{ (finance.params.discount*100)|round(1) }}%; {% endif %}{% if finance.indicators.npvTotal < 0 %}with a negative NPV of {{ finance.indicators.npvTotal|wan }} EUR; {% endif %}the project <strong>does not meet the required return</strong>. Price, investment scale or operating cost should be optimized and the project re-evaluated.
{% endif %}

@@H3@@1.6.3 Overall conclusion

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@Considering technology, equipment, investment, financial analysis and risk together, the project is technically mature, equipment-reliable, reasonably costed, financially feasible and manageable in risk. <strong>Investment in the project is recommended</strong>.
{% else %}
@@P@@On balance, the project is technically feasible, but the financial indicators are not yet strong enough to support an investment decision. <strong>The design should be optimized before proceeding</strong>, focusing on improving pricing, reducing investment scale and lowering operating cost.
{% endif %}

@@P@@Detailed analysis follows in the subsequent chapters.
</script>
<script type="text/njk-template" id="tpl-ch02">@@H1@@Chapter 2. Background & Rationale

@@H2@@2.1 Industry context

{% if farm.species == "salmon" %}
@@P@@Atlantic salmon (Salmo salar) is a flagship premium seafood product, with global farmed output of about 2.8 million t/yr — roughly 50% from Norway, with Scotland, Chile, Canada and the Faroe Islands as the main traditional regions. Constrained sea-cage space, rising sea temperatures and sea-lice pressure have driven the industry toward <strong>land-based RAS</strong> since around 2015.

@@P@@Notable international projects include Atlantic Sapphire's Bluehouse plant in Miami (planned 100,000 t/yr), Salmon Evolution in Norway and similar large industrial RAS salmon projects. AKVA Group and Billund Aquaculture are among the established RAS EPC contractors.

@@P@@Demand for premium salmon is strong in many markets that currently rely heavily on imports. Local RAS salmon pilot projects have begun to appear, and demand for locally farmed high-quality salmon is robust, with prices around 60–90 EUR/kg.

{% elif farm.species == "turbot" %}
@@P@@Turbot (Scophthalmus maximus) is a premium marine species introduced from the UK and now a mainstay of cold-water marine aquaculture, with annual output of roughly 50,000–60,000 t.

@@P@@Traditional flow-through farming is energy-intensive (pumping thermostatically controlled groundwater), with large water use and variable quality. Since around 2010 producers have moved toward <strong>RAS</strong> for water and land savings and stable output. Field studies report stocking densities of 50–70 kg/m² (floor area) and an all-in cost of about 46–50 EUR/kg.

@@P@@Turbot demand is stable at 60–90 EUR/kg, with growing export demand in Japan and Korea.

{% elif farm.species == "grouper" %}
@@P@@Grouper is a premium warm-water marine species (including hybrid, giant and coral varieties), with annual output of roughly 150,000–200,000 t in its main producing regions.

@@P@@Traditional sea cages suffer high losses from typhoons, pollution and disease. RAS allows precise control of temperature, salinity and dissolved oxygen, sharply reducing losses and improving product quality. Several RAS grouper projects are in operation, with an all-in cost of 60–100 EUR/kg against a sales price of 100–200 EUR/kg — a healthy margin.

{% elif farm.species == "perch" %}
@@P@@Largemouth bass (Micropterus salmoides) is a fast-growing freshwater carnivorous species, with annual output of about 700,000 t, now a major freshwater species in its producing regions.

@@P@@Pond stocking density is limited by water quality and disease, so producers are moving toward <strong>controlled-environment / industrial</strong> bass farming, with RAS an important option. The sales price is stable at 30–50 EUR/kg and the industrial all-in cost is about 25–35 EUR/kg, leaving a reasonable margin.

{% elif farm.species == "mandarin" %}
@@P@@Mandarin fish (Siniperca chuatsi) is a traditional premium freshwater species with a high sales price (80–150 EUR/kg) aimed at high-end consumption. Traditional farming relies on live-bait feeding, which has limited its scale.

@@P@@Breakthroughs in formulated feed, combined with RAS, have made industrial mandarin-fish farming a leading direction for premium freshwater species. Several RAS mandarin-fish projects are now in operation.

{% elif farm.species == "tilapia" %}
@@P@@Tilapia is the world's second-largest farmed fish, with global output of about 6 million t/yr, much of it exported to Europe, the Americas and Southeast Asia, alongside stable domestic consumption.

@@P@@Traditional pond tilapia is very low cost (20–25 EUR/kg), but RAS still offers distinct advantages for water and land savings, disease control and export-grade quality control.

{% elif farm.species == "eel" %}
@@P@@Eel (Japanese or European eel) is a high-value migratory species whose juveniles are wild-caught, increasingly restricted under international conventions. Output is concentrated in a few regions and exported largely to Japan.

@@P@@RAS allows precise control of temperature (26–28°C), water quality and powdered-feed dosing, and is a mature process for intensive eel farming, with an all-in cost of about 60–100 EUR/kg against a sales price of 100–200 EUR/kg.

{% elif farm.species == "shrimp" %}
@@P@@Whiteleg shrimp (Litopenaeus vannamei) is the leading farmed shrimp, with annual output of about 2 million t, farmed at scale across coastal regions.

@@P@@Diseases such as white-feces syndrome and early-mortality syndrome have become serious, and traditional earthen ponds suffer high losses. Clear-water RAS (as opposed to turbid Biofloc systems) offers biosecurity, precise temperature control and stable water quality, making it a leading direction for premium shrimp.

{% else %}
@@P@@{{ farm.speciesName }} is an important aquaculture species. Against the problems of traditional farming — high water use, disease risk and variable product quality — recirculating aquaculture (RAS) is developing rapidly as a representative modern-fisheries technology.
{% endif %}

@@H2@@2.2 Local socio-economic context

@@P@@{{ project.location.full or 'The project site' }}{% if project.upperPlanName %} falls within the <strong>{{ project.upperPlanName }}</strong>,{% endif %} and offers good location, an established industrial base and a supportive policy environment.

@@P@@(The owner or preparer should add a description of the local population, economy, industry, transport and municipal infrastructure.)

@@H2@@2.3 Rationale for the project

The rationale rests on the following points:

@@H3@@2.3.1 Meeting strong demand for high-quality {{ farm.speciesName }}

{% if farm.species == "salmon" %}
@@P@@Salmon consumption in the target market exceeds 300,000 t/yr, while local output is under 10,000 t — over 95% is imported (mainly from Norway, Chile and the Faroe Islands). Supply-chain, currency and shipping-cost volatility make import prices unstable, and heavy import reliance is unfavorable for the local value chain and consumers.

@@P@@At 1,000 t/yr of land-based RAS salmon, the project is a meaningful addition to local supply capacity, helping reduce import reliance, stabilize prices and improve food-supply security.

{% elif farm.species == "turbot" %}
@@P@@Turbot is an important mid-to-high-end marine species with steadily growing demand. The project's RAS process removes the traditional dependence on pumping thermostatically controlled groundwater, achieving high density, water savings and stable output as a model for industry upgrading.

{% elif farm.species == "shrimp" %}
@@P@@Whiteleg shrimp is the most-consumed shrimp, but traditional earthen ponds now suffer serious disease and quality variability. The project's clear-water RAS process delivers a fully traceable, antibiotic-free, consistent premium shrimp product to meet rising consumer expectations.

{% else %}
@@P@@At {{ farm.yieldTons }} t/yr of {{ farm.speciesName }}, the project provides a consistent, traceable premium product through industrial farming, meeting both domestic upgrading and export demand.
{% endif %}

@@H3@@2.3.2 Driving the upgrading of aquaculture

@@P@@Industrial RAS is a major direction in world aquaculture, embodying the modern-fisheries ideals of saving water, land and energy while remaining controllable and environmentally sound. With {{ farm.totalSubSystems }} independent modules and N+1 redundancy, the project is a model for shifting regional aquaculture from extensive practice toward intensive, controlled-environment and sustainable operation.

@@H3@@2.3.3 Conserving water and protecting the environment

@@P@@Water reuse reaches 85–95%, requiring only 0.5–1 m³ of new water per kg of fish — just 5–10% of traditional flow-through farming. Wastewater is treated centrally and discharged to standard, with almost no diffuse pollution. {% if farm.totalSystemVolume > 0 %}With a total system volume of {{ farm.totalSystemVolume|round(0) }} m³ and a daily exchange rate of 5–10%, daily make-up water is about {{ (farm.totalSystemVolume * 0.075)|round(0) }} m³ and annual make-up about {{ (farm.totalSystemVolume * 0.075 * 365 / 10000)|round(1) }}×10⁴ m³, far below traditional farming at the same capacity.{% endif %}

@@H3@@2.3.4 Creating quality jobs and supporting the value chain

@@P@@Once in normal operation the project is expected to provide about {{ ((finance.params.laborCost / 50000)|round(0)) if finance.params.laborCost else 20 }} direct jobs (assuming an average annual wage of 50,000 EUR), while supporting upstream and downstream activity — feed, equipment, logistics and sales — and creating an estimated 3–5× indirect employment.

@@H2@@2.4 Favorable conditions

@@LIST@@
- <strong>Good market</strong>: demand for {{ farm.speciesName }} is stable, prices are firm, and sales channels are established
- <strong>Mature technology</strong>: RAS has many proven projects internationally, with abundant references for process design, equipment selection and operation
- <strong>Available supply chain</strong>: the RAS equipment supply chain is well developed, keeping investment controllable
- <strong>Policy support</strong>: national plans explicitly support modern controlled-environment agriculture, RAS and green low-carbon industry, with grants and tax incentives in many regions
{% if project.upperPlanName %}- <strong>Planning fit</strong>: the project aligns with the industrial positioning of the <strong>{{ project.upperPlanName }}</strong>{% endif %}
@@END_LIST@@

@@H2@@2.5 Policy basis

@@LIST@@
- National fisheries development plan
- Guidance on accelerating green development of aquaculture
- Modern controlled-environment agriculture development plan
- Guidance on high-quality development of modern agricultural parks
{% if project.upperPlanName %}- {{ project.upperPlanName }}{% endif %}
- (Other local policy documents to be added by the owner)
@@END_LIST@@

<script type="text/njk-template" id="tpl-ch03">@@H1@@Chapter 3. Market & Demand

@@H2@@3.1 Market analysis

{% if farm.species == "salmon" %}
@@P@@<strong>International market</strong>: global Atlantic salmon output is about 2.8 million t/yr, a market worth over USD 20 billion. Norway supplies roughly 50%, with Scotland, Chile, Canada and the Faroe Islands as the other main regions. Limited sea space, rising temperatures and sea lice have slowed supply growth, supporting a long-term upward price trend.

@@P@@<strong>Target market</strong>: consumption in the target market is about 300,000 t/yr with over 95% import reliance (mainly Norway, the Faroe Islands, Chile and Canada). Major-city demand, premium restaurants, supermarkets and fresh-food e-commerce are the main channels, at 60–90 EUR/kg ex-works and 100–200 EUR/kg at retail.

{% elif farm.species == "turbot" %}
@@P@@<strong>Market</strong>: turbot output is about 50,000–60,000 t/yr, serving cold-region cities and export markets in Japan and Korea. Prices are stable at 60–90 EUR/kg, sold mainly through premium restaurants, supermarkets and live-fish distribution. Tight groundwater and high energy use in traditional farming are pushing the industry toward RAS.

{% elif farm.species == "grouper" %}
@@P@@<strong>Market</strong>: grouper output is about 150,000–200,000 t/yr, serving premium restaurants and live-fish distribution, at 80–200 EUR/kg depending on variety. Export demand in Hong Kong and Southeast Asia is steady.

{% elif farm.species == "perch" %}
@@P@@<strong>Market</strong>: largemouth bass output is about 700,000 t/yr. Prices are stable at 30–50 EUR/kg through supermarkets, live-fish e-commerce and restaurants. Given pond water-quality and disease limits, premium industrial product commands a 50–70 EUR/kg premium.

{% elif farm.species == "shrimp" %}
@@P@@<strong>Market</strong>: whiteleg shrimp output is about 2 million t/yr, sold through supermarkets, e-commerce, restaurants and export. Amid disease pressure such as white-feces syndrome, premium RAS shrimp commands a 30–50% premium at 50–80 EUR/kg.

{% elif farm.species == "tilapia" %}
@@P@@<strong>Market</strong>: tilapia is an export-oriented species with output of about 1.7 million t/yr, exported mainly to Europe, the Americas and Southeast Asia, with stable domestic consumption at 18–25 EUR/kg.

{% elif farm.species == "eel" %}
@@P@@<strong>Market</strong>: eel is a traditional export species to Japan and Korea with stable domestic demand, at 100–200 EUR/kg depending on quality, sold mainly through export processors, premium restaurants and live-fish e-commerce.

{% else %}
@@P@@{{ farm.speciesName }} is an important aquaculture species with stable demand, sold through supermarkets, restaurants, live-fish distribution and export.
{% endif %}

@@H2@@3.2 Target-market analysis

@@P@@(This section — target customers, sales radius, channels and offtake intentions — should be completed by the owner or preparer based on the actual project.)

@@P@@Based on the {{ farm.yieldTons }} t/yr output, a preliminary channel split is:

@@LIST@@
- Premium supermarkets and fresh e-commerce: typically 30–50% of sales, relatively stable pricing
- Premium restaurants (hotel chains, Japanese restaurants, etc.): typically 20–40%, demanding on quality
- Live-fish wholesale: typically 20–30%, slightly lower price but steady volume
- Export or branded custom: typically 0–20%, higher unit price but more volatile orders
@@END_LIST@@

@@P@@<strong>Recommendation</strong>: before execution, sign 3–5 year supply agreements with at least 2–3 core customers to lock in base volume and a price floor.

@@H2@@3.3 Price trends

{% if farm.species == "salmon" %}
@@P@@The international Atlantic salmon price (NASDAQ Salmon Index) has long ranged 5–10 USD/kg; landed import prices run 40–60 EUR/kg and retail 100–200 EUR/kg. The project's assumed ex-works price of {{ finance.params.price }} EUR/kg sits within a reasonable range.

{% else %}
@@P@@{{ farm.speciesName }} prices have been relatively stable over the past five years; the project's assumed ex-works price of {{ finance.params.price }} EUR/kg is within a reasonable industry range.
{% endif %}

@@P@@<strong>Price volatility is the project's largest risk factor.</strong> The sensitivity analysis shows a ±20% price change swings the IRR by about 11.1%, far more than any other factor. Long-term supply agreements, branding and export certification are recommended to lock in price before execution.

@@H2@@3.4 Sales channels and plan

@@P@@(This section — specific channels, offtake intentions and branding — should be completed by the owner, covering key customers, contract values, payment terms, brand strategy and marketing spend.)

@@H2@@3.5 Project scale

@@H3@@3.5.1 Basis for the scale

@@P@@The design scale is <strong>{{ farm.yieldTons }} t/yr of {{ farm.speciesName }}</strong>, set on the following basis:

@@LIST@@
- <strong>Market demand</strong>: per the analysis above, the scale matches target-market capacity and expected sales can absorb the output
- <strong>Reasonable investment</strong>: total investment of {{ capex.totalInvestment|wan }} EUR is within the owner's capacity
- <strong>Operability</strong>: {{ farm.totalSubSystems }} independent modules capture scale benefits while remaining manageable
- <strong>Economies of scale</strong>: RAS shows strong scale effects, and this scale falls in the typical economic range for the industry (500–3,000 t)
- <strong>Site fit</strong>: the required building area, site area and utility connections are within the site's capacity
@@END_LIST@@

@@H3@@3.5.2 Stage configuration

The farm runs {{ farm.stages|length }} staggered grow-out stages for continuous harvest:

@@TABLE@@
Stage|Fish size|Duration|Standing biomass (t)|Temp (°C)|Density (kg/m³)|FCR|Modules|Tanks
{% for s in farm.stages %}{{ s.name }}|{{ s.weightStart|round(0) }}-{{ s.weightEnd|round(0) }} g|{{ s.months }} mo|{{ s.biomass|round(1) }}|{{ s.tempOpt|round(1) }}|{{ s.density|round(0) }}|{{ s.FCR|round(2) }}|{{ s.subSystemCount }}|{{ s.subSystemCount * s.poolsPerSet }}
{% endfor %}@@END_TABLE@@

@@P@@Total steady-state standing biomass is about {{ farm.totalBiomass|round(1) }} t over a full cycle of about {{ farm.totalMonths }} months. Staggered stocking means a portion of fish is harvested each month in steady state, yielding {{ farm.yieldTons }} t/yr.

@@H2@@3.6 Product plan

@@P@@The main product is <strong>live / fresh {{ farm.speciesName }}</strong> at a market size of about {{ farm.stages[farm.stages|length-1].weightEnd|round(0) }} g (per actual harvest weight).

@@P@@Product forms, adjusted to demand, mainly include:

@@LIST@@
- Live fish: delivered by live-haul truck to supermarkets, restaurants and distributors
- Fresh-chilled fish: slaughtered and delivered via cold chain
- Fillets / portions: processed and vacuum-packed for retail and e-commerce
- Juveniles or intermediate-size fish: sold externally as market conditions allow
@@END_LIST@@

@@P@@Products are produced to applicable food-safety and seafood-quality standards. Organic, eco-label or geographical-indication certification is recommended to enhance brand premium.

<script type="text/njk-template" id="tpl-ch05">@@H1@@Chapter 5. Technical Concept

@@H2@@5.1 Choice of process

{% if farm.species == "salmon" %}
@@P@@Atlantic salmon is a cold-water migratory species requiring water tightly held at 12–15°C. In many regions ambient temperatures sit well above this band — coastal summer water can reach 25–30°C — so salmon cannot be farmed directly. Precise temperature control via RAS is the <strong>only viable process</strong> for land-based salmon production.
@@P@@Through integrated physical filtration, biofiltration, disinfection, oxygenation, degassing and temperature control, RAS achieves 85–95% water reuse and creates a stable, controllable environment in a closed loop. The design draws on mature international references such as Atlantic Sapphire (Miami RAS salmon plant, design 100,000 t/yr) and Loch Duart in Scotland.
{% elif farm.species == "turbot" %}
@@P@@Turbot (Scophthalmus maximus) is a cool-water benthic marine fish requiring 14–18°C and 25–32‰ salinity, with high demands on clarity and dissolved oxygen. In cold regions winter water is too cold and summer too warm; traditional flow-through farming is energy-intensive with variable quality. RAS sharply improves growth and survival through precise temperature control and water purification, with field densities of 50–70 kg/m² (floor area), and is now the mainstream process for industrial turbot.
{% elif farm.species == "grouper" %}
@@P@@Grouper is an important warm-water marine species (optimal 24–30°C) with high water-quality and oxygen demands, especially sensitive to fluctuation in the juvenile stage. RAS addresses the core problems of cages/ponds — temperature swings, disease and low juvenile survival — through precise temperature control, stable water quality and biosecurity.
{% elif farm.species == "perch" %}
@@P@@Largemouth bass is a freshwater carnivore (optimal 22–28°C) with fairly high water-quality demands. Versus ponds, RAS saves water and land, controls disease and stabilizes the product, and is the leading direction for land-based industrial bass farming.
{% elif farm.species == "mandarin" %}
@@P@@Mandarin fish is a premium freshwater carnivore with a high price and stable market. It prefers 22–28°C with strict water-quality and feed demands (traditionally live bait). Combined with formulated feed, RAS enables stable industrial production and is a leading direction for premium freshwater species.
{% elif farm.species == "tilapia" %}
@@P@@Tilapia is highly adaptable (tolerating 25–32°C) and the world's second-largest farmed fish. RAS is adopted here mainly for water and land savings, disease control and multiple crops per year.
{% elif farm.species == "eel" %}
@@P@@Eel (Japanese or European eel) is a high-value migratory species with wild-caught juveniles and a long cycle (2–3 years). RAS allows precise control of temperature (26–28°C), water quality and powdered-feed dosing, and is a mature process for intensive eel farming with many industrial cases.
{% elif farm.species == "shrimp" %}
@@P@@Whiteleg shrimp tolerates high temperature (28–32°C) and a wide salinity range (5–35‰) and is the most important farmed shrimp. The project uses a clear-water RAS process (as opposed to turbid Biofloc) with high density for water and land savings, disease control and stable output.
{% else %}
@@P@@The project uses a recirculating aquaculture process (RAS) with integrated physical filtration, biofiltration, disinfection, oxygenation and degassing for high-density, water- and land-saving, controlled-environment production.
{% endif %}

@@P@@Key advantages of RAS:
@@LIST@@
- <strong>Water saving</strong>: 85–95% reuse, 0.5–1 m³ of water per kg of fish — just 5–10% of flow-through farming
- <strong>Land saving</strong>: high density (30–100 kg/m³), with site area per unit output 1/10–1/50 of earthen ponds
- <strong>Controllable</strong>: temperature, DO, pH and TAN are controlled throughout, independent of season or weather, enabling year-round production
- <strong>Environmental</strong>: wastewater is treated centrally, solids can be used as fertilizer, with near-zero discharge and no diffuse pollution
- <strong>Biosecurity</strong>: the closed system excludes external pathogens, reduces drug use and safeguards food safety
- <strong>Siting flexibility</strong>: not reliant on natural water bodies, it can be built near cities, inland or in non-traditional locations
@@END_LIST@@

@@H2@@5.2 Process flow

The process uses a hybrid "series mainline + parallel bypass" architecture; the mainline runs:

@@P@@<strong>Fish tank → drum filter → protein skimmer (bypass) → biofilter → UV disinfection → CO₂ stripper → oxygenation → fish tank</strong>

@@P@@Three bypass branches are also provided:
@@LIST@@
- <strong>Protein-skimmer branch</strong>: diverts about {{ workflow.skimmer.flowPct|round(0) if workflow.skimmer.enabled else 0 }}% of the recirculation flow to remove dissolved organic matter (DOM) and fine TSS{% if workflow.skimmer.enabled and workflow.skimmer.mode == 'ozone' %}, with ozone enhancement{% endif %}
- <strong>Denitrification branch</strong>: {% if workflow.denitri.enabled %}diverts about {{ workflow.denitri.flowPct|round(0) }}% of the flow, reducing NO₃ to N₂ with methanol under anoxic conditions to cut water exchange{% else %}not used in this project; NO₃ build-up is controlled by 5–10% daily water exchange{% endif %}
- <strong>AOP (advanced oxidation) branch</strong>: {% if workflow.aop.enabled %}diverts about {{ workflow.aop.flowPct|round(0) }}% of the flow, using ozone+UV to oxidize geosmin/2-MIB (off-flavor compounds) and residual DOM{% else %}not used in this project{% endif %}
@@END_LIST@@

@@P@@The detailed P&ID is provided as an appendix figure (generated automatically by iRAS).

@@IMG@@id=processFlow|caption=Figure 5-1 Process flow schematic (generated by iRAS; the detailed P&ID is exported from the iRAS pid.html page)|w=600|h=250@@

@@H2@@5.3 Unit design

@@H3@@5.3.1 Fish tanks

The farm has {{ farm.stages|length }} grow-out stages on independent loops, with {{ farm.totalSubSystems }} independent modules and {{ farm.totalPools }} fish tanks in total. The per-stage tank configuration is:

@@TABLE@@

@@P@@Tanks are HDPE composite or fiberglass (FRP), circular deep-water design with a dual drainage system (center sludge drain + side outlet) and strong self-cleaning. Each module recirculates independently, so a fault in one module does not affect the others, greatly improving biosecurity.

@@H3@@5.3.2 Drum filter (RDF)

The rotating drum filter is the first treatment unit, physically retaining suspended solids (waste feed, feces, biofilm fragments) on a 60 μm stainless-steel screen. Design parameters:

@@H3@@5.3.3 MBBR biofilter

The biofilter (MBBR, Moving Bed Biofilm Reactor) is the core unit, oxidizing TAN (NH₄) to NO₃ via nitrifiers on the surface of suspended media — the key to ammonia removal. Design parameters:

@@P@@The MBBR uses coarse-bubble aeration (from a Roots blower) to supply oxygen for the biofilm and keep the media suspended. This aeration is separate from the main tank oxygenation, avoiding double-counting of dissolved oxygen.

@@H3@@5.3.4 UV disinfection

@@P@@A UV dose of {{ workflow.uv.dose|round(0) }} mJ/cm² effectively inactivates common fish pathogens (bacteria 99.7%, fish viruses 86–98%, protozoa 99.7–99.99%).

@@H3@@5.3.5 CO₂ stripper

<script type="text/njk-template" id="tpl-ch06">@@H1@@Chapter 6. Equipment & Process Design

@@H2@@6.1 Equipment-selection principles

Equipment selection follows these principles:

@@LIST@@
- <strong>Advanced yet proven</strong>: core process equipment (drum filter, biofilter, oxygenation, etc.) uses advanced, mature technology, avoiding anything not validated in long-term industrial use
- <strong>N+1 redundancy on critical equipment</strong>: main pumps, blowers, drum filters and UV are configured N+1, so any single failure switches over automatically within 30 s without interrupting production
- <strong>Modular layout</strong>: the facility is split into {{ farm.totalSubSystems }} independent recirculation modules so a fault in one does not affect the others, greatly improving biosecurity and production continuity
- <strong>Supply-chain pragmatism</strong>: water-treatment equipment (drum filter, blowers, pumps, UV) favors established mainstream brands; high-end core items (LOX cone, automated valves, high-precision instruments) may use specialist brands
- <strong>Energy efficiency</strong>: the main recirculation pumps use VFD drives, the biofilter blowers are high-efficiency Roots units, and oxygenation favors pure oxygen + cone (80–90% absorption)
- <strong>Corrosion resistance</strong>: {% if (farm.stages|length > 0) and (farm.stages[farm.stages|length-1].salinity > 5) %}this project has seawater/brackish stages, so all wetted parts use 316L stainless steel, HDPE or FRP, one grade above a freshwater project{% else %}this is a freshwater system, so 304 stainless steel, HDPE or FRP wetted parts meet the corrosion requirement{% endif %}
@@END_LIST@@

No.|Equipment|Specification|Total qty|Note

@@H2@@6.4 Sourcing and procurement strategy

@@LIST@@
- <strong>Core water-treatment equipment</strong> (drum filter, biofilter, UV, CO₂ stripper): established mainstream brands, reasonable price and convenient service. Suppliers such as AKVA Group (Norway) and other established RAS vendors are candidates
- <strong>Pumps and blowers</strong>: mainstream brands; large main pumps should use VFD drives for efficiency, and critical pumps need N+1 standby
- <strong>Oxygenation</strong>: the LOX cone from a specialist brand, with established suppliers for the LOX tank and vaporizer
- <strong>Instrumentation and control</strong>: online water-quality monitors (DO/pH/temperature) favor specialist brands (e.g. WTW, Hach); the control system can use an established PLC + SCADA
- <strong>Procurement</strong>: main equipment by competitive tender, instruments and pipe/valve items by competitive negotiation, with a total procurement cycle of about 4–6 months
@@END_LIST@@

<script type="text/njk-template" id="tpl-ch07">@@H1@@Chapter 7. Civil Works & Utilities

@@H2@@7.1 Site layout

@@P@@(The detailed site layout — functional zoning, building orientation, roads and landscaping — is to be designed by the owner or architect based on the actual site.)

@@P@@Basic principles and recommendations for a RAS site layout:

@@LIST@@
- <strong>Clear zoning</strong>: separate the production area, office/living area and ancillary area (logistics, storage, equipment rooms)
- <strong>Orientation</strong>: the main culture hall is best aligned north–south to limit solar gain on water temperature and aid ventilation
- <strong>Clean/dirty separation</strong>: intake, recirculation, drainage and make-up pipes should not cross
- <strong>Material flow</strong>: a one-way flow from juvenile intake → grow-out stages → market-size dispatch, to limit disease spread
- <strong>Fire access</strong>: a ring fire lane at least 4 m wide around the main buildings
- <strong>Green-space ratio</strong>: ≥ 20% (subject to local planning requirements)
- <strong>Expansion reserve</strong>: land set aside for phase 2/3 expansion

UV / oxygenation / control|approx. {{ ((opex.totalExclDep * 0.20) / 0.7 / 8000 * 0.10)|round(0) }} kW|—
Heat pump / cooling|approx. {{ ((opex.totalExclDep * 0.20) / 0.7 / 8000 * 0.20)|round(0) }} kW|depending on climate
Lighting + office + other|approx. {{ ((opex.totalExclDep * 0.20) / 0.7 / 8000 * 0.15)|round(0) }} kW|—
@@SUBTOTAL@@Total installed|approx. {{ ((opex.totalExclDep * 0.20) / 0.7 / 8000 * 1.5)|round(0) }} kVA|transformer sized at average power × 1.5
@@END_TABLE@@

@@H3@@7.4.2 Power-supply plan

@@LIST@@
- <strong>Main supply</strong>: 10 kV dedicated line, dual feeders
- <strong>Transformation/distribution</strong>: a dedicated switchroom with N+1 transformers
- <strong>Backup power</strong>: a diesel generator at 100% site load, auto-start within 30 s (ATS transfer)
- <strong>UPS</strong>: 30-minute ride-through for control systems and critical instruments
- <strong>Power-factor correction</strong>: capacitor banks in the switchroom, power factor ≥ 0.95
@@END_LIST@@

@@H2@@7.5 HVAC

@@H3@@7.5.1 HVAC load

@@LIST@@
- Culture hall: maintain the design water temperature (see Chapter 5 for process parameters)
- Offices: cooling to 26°C in summer, heating to 18–20°C in winter
- Laboratory: year-round 22°C ± 2°C, 50% RH
@@END_LIST@@

@@H3@@7.5.2 HVAC system selection

@@LIST@@
- <strong>Culture-hall temperature control</strong>: an industrial heat pump (air/water/ground source, per site conditions), for both heating and cooling
- <strong>Plate heat exchanger</strong>: between discharge and intake, recovering ≥ 75% of the heat
- <strong>Offices</strong>: VRF or split-system air conditioning
- <strong>Fresh-air system</strong>: the culture hall has fresh-air supply at 6–10 air changes/h to prevent ammonia build-up
@@END_LIST@@

@@P@@The detailed HVAC design should be optimized for local climate, water-source conditions and energy prices to find the most economical solution.

@@H2@@7.6 Automation and control

@@LIST@@
- <strong>Control platform</strong>: industrial PLC + SCADA + industrial Ethernet
- <strong>Online monitoring</strong>: 24×7 monitoring of DO, pH, temperature, TAN, NO₂, flow and other key parameters
- <strong>Alarms</strong>: three-tier alarms (local audible/visual + control-room screen + mobile push)
- <strong>Data logging</strong>: historical data retained for over a year, with remote query and analysis
- <strong>CCTV</strong>: full coverage of the hall, equipment rooms and entrances, retained 30 days
@@END_LIST@@

<script type="text/njk-template" id="tpl-ch09">@@H1@@Chapter 8. Environmental Impact & Permitting

@@P@@<strong>Note</strong>: this chapter is a preliminary environmental analysis within the feasibility study and does not replace a formal Environmental Impact Assessment (EIA). Once the project is approved, a qualified body should carry out a dedicated EIA and issue an independent report; permitting requirements vary by jurisdiction.

@@H2@@8.1 Baseline environment

@@P@@(The baseline environment — air, water, soil, noise and ecology — should be completed by the owner or preparer from local data.)

@@H2@@8.2 Pollution-source identification

The main pollution sources are identified below:

@@H3@@8.2.1 Wastewater

@@TABLE@@
Stream|Source|Main pollutants|Daily volume
System discharge (exchange overflow)|exchange/overflow crossing the system boundary|TAN, NO₃, TSS|approx. {{ farm.dischargeM3D|round(0) }} m³/d (dissolved: TAN {{ farm.dischargeTAN_mg_L|round(2) }} mg/L · NO₃-N {{ farm.dischargeNO3_mg_L|round(1) }} mg/L; solid TSS is captured by the RDF + skimmer into sludge treatment, not discharged to the water phase)
{% if workflow.denitri.enabled %}Denitrification sludge|denitrification reactor|biological sludge|approx. 0.1–0.3 m³/d
{% endif %}Hall washdown|floors, equipment exterior|low-concentration TSS|approx. 5–10 m³/d
@@END_TABLE@@

@@H3@@8.2.2 Solid waste

@@LIST@@
- Waste feed and feces (filtered concentrate): about {{ (farm.totalFeedDaily * 0.30)|round(0) }} kg/d (estimated at 30% of feed becoming solids, high moisture)
- Mortalities: at a normal 1–3% rate, estimated at 1% ≈ {{ (farm.yieldTons * 0.01 * 1000 / 365)|round(1) }} kg/d
- Medication packaging and office/domestic waste: small quantities
@@END_LIST@@

@@H3@@8.2.3 Air emissions

@@LIST@@
- CO₂ stripper off-gas: mainly CO₂ and water vapor, low concentration, discharged directly
- Biofilter blower off-gas: a little ammonia, diluted by hall ventilation
- Ozone-equipment off-gas{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}: residual ozone must be destroyed (ozone destructor), emission < 0.1 mg/m³{% endif %}
@@END_LIST@@

@@H3@@8.2.4 Noise

@@LIST@@
- Main pump room: approx. 80–85 dB(A)
- Blower room: approx. 80–90 dB(A)
- Oxygen generator / LOX vaporizer: approx. 70–80 dB(A)
@@END_LIST@@

@@H2@@8.3 Discharge standards

Discharges follow the standards below:

@@TABLE@@
Pollutant class|Standard|Key limits
Aquaculture discharge|applicable aquaculture-discharge standard or local rules|TSS ≤ 10 mg/L, COD ≤ 30 mg/L, NH₃-N ≤ 4 mg/L
Industrial solid waste|applicable solid-waste storage/landfill standard|—
Noise|applicable industrial boundary-noise standard|class-2 area: 60 dB(A) day, 50 dB(A) night
@@END_TABLE@@

@@H2@@8.4 Environmental protection measures

@@H3@@8.4.1 Wastewater treatment

@@LIST@@
- <strong>Treatment plant</strong>: settling + filtration + biological treatment (MBR or SBR), with effluent meeting the applicable discharge standard
- <strong>Water reuse</strong>: treated water meeting standard is reused for hall washdown and landscaping, reducing discharge
- <strong>Separated drainage</strong>: stormwater discharged directly, wastewater treated before discharge
- <strong>Discharge monitoring</strong>: online analyzers for COD, ammonia, TSS and flow
@@END_LIST@@

@@H3@@8.4.2 Solid-waste handling

@@LIST@@
- <strong>Waste-feed/feces recovery</strong>: thickened and sent off-site as organic-fertilizer feedstock
- <strong>Mortality disposal</strong>: a mortality-handling facility (burial, incineration or outsourcing) to prevent disease spread
- <strong>Sludge dewatering</strong>: denitrification sludge is dewatered and outsourced
- <strong>Office/domestic waste</strong>: segregated and collected by the municipal service
@@END_LIST@@

@@H3@@8.4.3 Noise control

@@LIST@@
- Pump and blower rooms use acoustic walls and silencers to keep boundary noise within limits
- Equipment bases have anti-vibration pads to reduce structure-borne noise
- Noisy equipment is placed inside the building, away from the boundary
@@END_LIST@@

@@H3@@8.4.4 Air-emission control

@@LIST@@
- Ozone equipment has an ozone destructor, emission < 0.1 mg/m³
- Biofilter blower off-gas is diluted by hall ventilation, keeping site ammonia within limits
- The emergency generator has exhaust treatment (if used)
@@END_LIST@@

@@H2@@8.5 Preliminary impact assessment

@@P@@Based on the sources and measures above, the overall environmental impact is:

@@LIST@@
- <strong>Water</strong>: discharge volumes are small and treated to standard, with minimal impact on the receiving water
- <strong>Air</strong>: emissions are mainly low-concentration CO₂ and water vapor, with no SO₂ or NOₓ
- <strong>Noise</strong>: with controls in place, boundary noise meets the standard
- <strong>Ecology</strong>: the closed system does not directly contact natural aquatic ecosystems; saving water and land, its impact on surrounding ecology is small
- <strong>Solid waste</strong>: recovery and safe disposal prevent secondary pollution
@@END_LIST@@

{% if farm.yieldTons > 2000 %}
@@P@@<strong>Note</strong>: given its size ({{ farm.yieldTons }} t/yr, total investment {{ capex.totalInvestment|wan }} EUR), the project may require a full EIA report (rather than a short form). The owner should confirm with the local environmental authority.
{% else %}
@@P@@<strong>Preliminary conclusion</strong>: the project is moderate in scale and, with sound environmental facilities and management, its impact is manageable. The next step is a formal EIA by a qualified body.
{% endif %}

@@H2@@8.6 ESG considerations

@@P@@Beyond regulatory compliance, the project's environmental, social and governance (ESG) profile is summarized below, drawing on the technical and operating parameters established earlier in this report. These points are intended as a basis for the owner's own ESG reporting and for discussions with lenders and customers.

@@H3@@8.6.1 Environmental

@@LIST@@
- <strong>Water</strong>: 85–95% recirculation means about 0.5–1 m³ of new water per kg of fish — roughly 5–10% of flow-through farming — with treated discharge and near-zero diffuse pollution.
- <strong>Land</strong>: high stocking density gives a site-area intensity far below earthen ponds, easing pressure on coastal and agricultural land.
- <strong>Energy and carbon</strong>: RAS is more electricity-intensive than flow-through systems; sourcing low-carbon power, heat recovery (plate exchange ≥ 75%) and efficient pumps/blowers are the main levers for reducing the operational carbon footprint.
- <strong>Resource recovery</strong>: captured solids are routed to organic-fertilizer use rather than discharged.
@@END_LIST@@

@@H3@@8.6.2 Social

@@LIST@@
- <strong>Food safety and biosecurity</strong>: the closed system excludes external pathogens, reduces or eliminates antibiotic use and yields a fully traceable product.
- <strong>Local supply and jobs</strong>: the project adds local production capacity, reducing import reliance, and creates direct and indirect employment along the feed, equipment, logistics and sales chain.
- <strong>Occupational health and safety</strong>: see Chapter 9 (HSE) for the safety, oxygen-handling and fire measures protecting the workforce.
@@END_LIST@@

@@H3@@8.6.3 Governance

@@LIST@@
- <strong>Monitoring and transparency</strong>: 24×7 online water-quality and discharge monitoring, with logged data, supports verifiable environmental reporting.
- <strong>Standards and permitting</strong>: operation to recognized discharge, solid-waste and noise standards, with a formal EIA to follow, provides an auditable compliance basis.
- <strong>Risk management</strong>: N+1 redundancy, backup power and the risk framework in Chapter 13 underpin operational resilience and responsible governance.
@@END_LIST@@
</script>
<script type="text/njk-template" id="tpl-ch10">@@H1@@Chapter 9. Health, Safety & Fire (HSE)

@@H2@@9.1 Hazard identification

The main hazards are identified below:

@@H3@@9.1.1 Chemical hazards

@@TABLE@@
Chemical|Hazard|Storage|Emergency measures
Liquid oxygen|strong oxidizer, supports combustion, cryogenic|3 t vertical vacuum-insulated tank, ventilated outdoors|no fire, no oils, no organic contact
{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}Ozone|strong oxidizer, toxic (8 ppm lethal)|generated on site, not stored; ozone monitor + destructor|evacuate and ventilate on leak
{% endif %}{% if workflow.denitri.enabled %}Methanol|flammable, toxic|in explosion-proof drums, ventilated store|fire prevention, leak prevention, no ingestion
{% endif %}NaHCO₃|moderately corrosive (dust irritant)|dry store|wear mask and goggles
Organic acids / disinfectants|corrosive, some toxic|corrosion-resistant store|wear protective gloves
@@END_TABLE@@

@@H3@@9.1.2 Electrical hazards

@@LIST@@
- HV distribution: 10 kV incomer + transformer; electrical work requires certification
- Pumps and blowers: earthing and earth-leakage protection
- Wet environment: the culture hall is humid, so electrical equipment is rated ≥ IP54
- Emergency lighting: in escape routes, the switchroom and the control room
@@END_LIST@@

@@H3@@9.1.3 Mechanical hazards

@@LIST@@
- Drum filter: rotating parts, pinch-point guarding
- Fish tanks: high water level, drowning risk, guardrails fitted
- Pumps and blowers: high-speed rotation, entanglement guarding
- Maintenance areas: safety signage, railings and warning lights
@@END_LIST@@

@@H3@@9.1.4 Biological hazards

@@LIST@@
- Fish pathogens: entry/exit disinfection to prevent cross-contamination
- Mortality handling: wear gloves, avoid puncture injuries
- Staff: health certificates and periodic check-ups to prevent disease spread
@@END_LIST@@

@@H2@@9.2 Occupational safety measures

@@H3@@9.2.1 Safety management system

@@LIST@@
- A safety committee chaired by the general manager
- A safety officer (full-time if staff > 100, otherwise part-time)
- Documented safety responsibilities, work-safety SOPs and emergency plans
- Pre-shift safety briefings, monthly safety meetings, quarterly drills
- Certification: electricians, pressure-vessel (LOX) and special-operation staff must be certified
@@END_LIST@@

@@H3@@9.2.2 Personal protective equipment

@@LIST@@
- Work clothing + non-slip shoes (all staff)
- Hard hats (equipment rooms, maintenance areas)
- Goggles + corrosion-resistant gloves (chemical handling)
- Dust masks (dusty work)
- Life jackets + harnesses (work at height/over water)
@@END_LIST@@

@@H3@@9.2.3 Safety facilities

@@LIST@@
- Comprehensive warning signs and safety notices
- Emergency-stop buttons by major equipment
- Emergency eyewash and showers (chemical areas)
- Life rings and guardrails (around tanks)
- Safe passageways and evacuation signage
@@END_LIST@@

@@H2@@9.3 Health and hygiene

@@H3@@9.3.1 Working-environment hygiene

@@LIST@@
- Hall ventilation at 6–10 air changes/h, ammonia kept < 5 ppm
- Noise: < 85 dB(A) in work areas, < 60 dB(A) in offices
- Lighting: ≥ 200 lux in work areas, ≥ 300 lux in offices, ≥ 500 lux in the lab
- Temperature/humidity: offices 18–26°C/40–70% RH, lab 22°C/50% RH
@@END_LIST@@

@@H3@@9.3.2 Food safety and hygiene

@@LIST@@
- Staff hold health certificates, have annual check-ups, and may not work with a communicable disease
- Hand disinfection before work; change into work clothing and disinfect footwear when entering the hall
- Disinfection baths at hall entries/exits
- Pest control: insect curtains and rodent boards at entrances
- Laboratory: GMP standard, with full sampling and analysis records
@@END_LIST@@

@@H3@@9.3.3 Staff welfare

@@LIST@@
- Canteen: meets food-safety law, with supplier documentation and food sampling
- Dormitory: ventilation, daylight, hot water and washing facilities
- Medical room: first-aid supplies and an AED
- Health records kept for every employee
@@END_LIST@@

@@H2@@9.4 Fire-protection design

@@H3@@9.4.1 Basis of fire design

@@LIST@@
- Applicable building fire-protection code
- Applicable fire-extinguisher placement standard
- Applicable automatic sprinkler standard
- Applicable fire-alarm system standard
- Specific requirements of the local fire authority
@@END_LIST@@

@@H3@@9.4.2 Fire-hazard classification

@@TABLE@@
Building|Fire hazard|Fire-resistance grade
Main culture hall|Class E (low)|Grade 2
Water-treatment room|Class E (low)|Grade 2
LOX station|Class A (strong oxidizer)|Grade 2
Diesel generator room|Class D|Grade 2
Office building|Civil|Grade 2
Warehouse (chemicals)|Class C|Grade 2
@@END_TABLE@@

@@H3@@9.4.3 Fire-fighting facilities

@@LIST@@
- <strong>Fire water</strong>: outdoor hydrants + an on-site fire tank (volume per the applicable code)
- <strong>Indoor hydrants</strong>: in the main buildings per code
- <strong>Automatic sprinklers</strong>: in the switchroom, lab and office
- <strong>Gaseous suppression</strong>: FM-200 or IG541 in the switchroom and PLC room
- <strong>Extinguishers</strong>: provided per code (dry powder, CO₂, ABC, etc.)
- <strong>Fire alarm</strong>: a site-wide automatic system (smoke, heat, manual call points)
- <strong>Emergency lighting + exit signage</strong>: on main routes and exits
@@END_LIST@@

@@H3@@9.4.4 Special fire requirements for the LOX station

@@LIST@@
- No combustibles, oils or organics within 5 m of the LOX tank
- A dedicated fire bund isolating the non-oxygen area
- Signage: "no smoking or open flame", "keep free of oil and organics"
- Platforms and valves treated to be oil-free and corrosion-resistant
- The tank has relief valves, pressure gauge, thermometer and burst disc
- Lightning protection: tank earthing and a lightning rod
@@END_LIST@@

@@H2@@9.5 Emergency plans

@@H3@@9.5.1 Emergency organization

@@LIST@@
- An emergency command group led by the general manager, with department heads as members
- Response teams: firefighting, rescue, medical and security
- A 24×7 duty roster of safety officers and technicians
@@END_LIST@@

@@H3@@9.5.2 Key emergency procedures

@@TABLE@@
Incident|Key response
Fire|evacuate → call emergency services → activate fire systems → cut power/gas → extinguish
LOX leak|stop work → evacuate → ventilate → close valves → call for help (if major)
{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}Ozone leak|don respirators → evacuate → ventilate → shut down ozone equipment → engage the destructor
{% endif %}Power loss|start the diesel generator → check critical equipment → contact the utility
Equipment failure (main pump/blower)|switch to standby → repair → alert (if biosecurity is affected)
Water-quality excursion (DO crash, TAN spike)|increase LOX/exchange → alert → investigate
Fire incident|handle per the fire emergency plan
Personal injury|first aid → hospital → report
@@END_TABLE@@

@@H3@@9.5.3 Drills and training

@@LIST@@
- Safety training: ≥ 24 h/yr for all staff (≥ 72 h for new hires)
- Drills: ≥ 1 per quarter, covering fire, LOX leak, power loss and biosecurity
- Certified work: electricians and special-operation staff certified, reviewed annually
- Safety inspections: monthly, with prompt correction of any hazards
@@END_LIST@@

@@P@@<strong>Note</strong>: this chapter is a preliminary HSE design at the feasibility stage and does not replace a formal safety assessment or occupational-health assessment, which should be commissioned from qualified bodies once the project is approved.
</script>
<script type="text/njk-template" id="tpl-ch11">@@H1@@Chapter 10. Implementation & Organization

The construction period is {{ finance.params.buildYears|round(1) }} years, followed by a 2-year ramp, reaching design capacity from Year 3. The overall schedule is:

@@TABLE@@
Phase|Timing|Main work|Duration (months)

@@H3@@10.1.2 Key milestones

- <strong>Equipment on site</strong>: 80% of main process equipment delivered

- <strong>Integrated commissioning</strong>: water, power and control all connected; single-unit and interlock tests passed
- <strong>Biofilter seeded</strong>: the nitrifier community is mature and fish can be stocked
- <strong>First stocking</strong>: fish stocked into the fry-stage modules
- <strong>Acceptance</strong>: formal acceptance after a 6-month trial with all indicators stably on target
@@END_LIST@@

@@H2@@10.2 Implementation steps

@@H3@@10.2.1 Forming the project team

@@P@@A project team should be formed 3–6 months before construction, with a project manager and technical, construction, procurement and quality leads. Engaging a consultant/EPC with RAS delivery experience is recommended.

@@H3@@10.2.2 Tendering and procurement

@@LIST@@
- <strong>Main equipment by open tender</strong>: drum filter, UV, oxygenation, biofilter and other main process equipment
- <strong>Instruments/control by competitive negotiation</strong>: online analyzers, PLC, SCADA
- <strong>Civil works as a main contract</strong>: open-tender EPC or PC, not piecemeal
- <strong>Long-term LOX supply agreement</strong>: to lock in price and supply stability
@@END_LIST@@

@@H3@@10.2.3 Construction quality control

@@LIST@@
- A supervisor on site throughout, witnessing critical operations
- Concealed works (buried pipes, waterproofing) accepted in sections with strict records
- Delivery acceptance (unpacking, nameplate check, accessory count, performance test)
- Three-stage acceptance: single-unit → interlock → full-load trial
@@END_LIST@@

@@H3@@10.3.1 Organization structure

{% if farm.yieldTons < 500 %}
@@P@@Given its small scale, a simplified structure is proposed:
@@LIST@@

- Production (culture technicians + operators, 5–8)
- Technology & equipment (2–3)
- Sales & administration (2–3)
@@END_LIST@@
{% elif farm.yieldTons < 2000 %}
@@P@@Given its moderate scale, a standard RAS-plant structure is proposed:
@@LIST@@
- General manager (1)
- Deputy GM / plant manager (1–2)
- Production: culture supervisor + per-stage technicians + operators (10–20 total)
- Technology & equipment: process engineer + control/water engineers + maintenance (4–6 total)
- Quality & biosecurity (2–3)
- Sales & marketing (3–5)
- Finance & administration (3–5)
@@END_LIST@@
{% else %}
@@P@@Given its larger scale, a full plant structure is adopted:
@@LIST@@
- GM + deputy GM (2–3)
- Production (supervisors + team leads + operators, 30–50 total)
- Technology & equipment (process, control, water engineers + maintenance, 8–12 total)
- Quality & biosecurity (4–6)
- Procurement (2–3)
- Sales & marketing (5–8)
- Finance & administration (5–8)
@@END_LIST@@
{% endif %}

@@H3@@10.3.2 Headcount

@@P@@Total headcount is estimated at about {{ ((finance.params.laborCost / 50000)|round(0)) if finance.params.laborCost else '—' }} (at an average annual wage of 50,000 EUR, total labor cost {{ finance.params.laborCost|eur if finance.params.laborCost else '—' }} EUR/yr), split as:

@@LIST@@
- Front-line production: 60–70%
- Technical & equipment: 15–20%
- Management & support: 15–20%
@@END_LIST@@

@@H2@@10.4 Training plan

@@H3@@10.4.1 Induction training

@@LIST@@
- Company policies, safety rules, biosecurity SOPs (2–3 days)
- RAS process fundamentals and equipment familiarization (3–5 days)
- Operating SOPs (role-specific, 1–2 weeks)
- Emergency drills (monthly)
@@END_LIST@@

@@H3@@10.4.2 Key-role training

@@LIST@@
- Culture technicians: fish biology, water-quality management, disease control (2–3 months)
- Process engineers: RAS principles, key-equipment maintenance, fault diagnosis (2–3 months)
- Control engineers: PLC programming, SCADA operation, sensor calibration (2–3 months)
- Maintenance staff: pump/blower repair, pipe/valve upkeep, electrical work (1–2 months)
@@END_LIST@@

@@P@@<strong>Recommendation</strong>: for key technical roles, bring in 1–2 experienced specialists from established RAS operators to lead the team in building operating SOPs and emergency plans.

<script type="text/njk-template" id="tpl-ch15">@@H1@@Chapter 13. Risk & Sensitivity

@@H2@@13.1 Risk identification

The main risks are identified below, grouped into four categories — market, technical, financial and policy:

@@H3@@13.1.1 Market risk

@@LIST@@
- <strong>Price volatility</strong>: the price of {{ farm.speciesName }} is driven by supply/demand, imports and exchange rates and can swing ±20–30% year to year. Price is the project's most sensitive factor, directly affecting feasibility
- <strong>Demand shift</strong>: changing consumer preferences and substitutes (other species, plant protein) may affect sales
- <strong>Sales-channel risk</strong>: without committed core customers, product may sell slowly and accumulate losses
- <strong>Competition</strong>: comparable RAS projects may come online within 2–3 years, intensifying regional competition
@@END_LIST@@

@@H3@@13.1.2 Technical risk

@@LIST@@
- <strong>Biofilter start-up failure</strong>: biofilter seeding takes 4–8 weeks; stocking to full load too soon causes a TAN spike and mass mortality
- <strong>Biosecurity</strong>: once a pathogen enters the loop it spreads fast and can wipe out a module or the whole site
- <strong>Equipment failure</strong>: failure of critical systems (main pump, blowers, LOX supply) can drop DO to lethal levels
- <strong>Water-quality excursion</strong>: poor operation (overfeeding, neglected exchange) can cause NO₃ build-up, falling pH and rising nitrite
- <strong>Power outage</strong>: a sudden outage can cause mass mortality within 30 minutes, so backup power is essential
@@END_LIST@@

@@H3@@13.1.3 Financial risk

@@LIST@@
- <strong>Cost overrun</strong>: actual investment may exceed the estimate by up to ±40%, so a 10–15% contingency is needed
- <strong>Construction delay</strong>: late equipment delivery or civil-works delays can extend the schedule and raise finance costs
- <strong>Interest-rate risk</strong>: a higher loan rate increases finance costs
- <strong>FX risk</strong>: {% if farm.species == "salmon" %}imported juveniles and some imported equipment are exposed to exchange-rate movements{% else %}some imported equipment is exposed to exchange-rate movements{% endif %}
- <strong>Liquidity risk</strong>: insufficient equity or undrawn loans could halt construction
@@END_LIST@@

@@H3@@13.1.4 Policy risk

@@LIST@@
- <strong>Tighter environmental rules</strong>: stricter discharge standards may require additional treatment investment
- <strong>Land-policy risk</strong>: changes in land use or zoning could affect continued operation
- <strong>Food-safety regulation</strong>: tightening rules on antibiotics and medication mean non-compliance could affect sales
- <strong>Trade-policy risk</strong>: export-oriented projects are exposed to trade measures (tariffs, quotas)
@@END_LIST@@

@@H2@@13.2 Sensitivity analysis

Chapter 12 ran a ±20% sensitivity analysis on the main uncertainties; the results (ordered by IRR swing) are:

@@TABLE@@
Factor|Low IRR|Base IRR|High IRR|IRR swing
{% for f in finance.tables.sensitivity %}{{ f.label }}|{{ (f.irrLow*100)|round(1) }}%|{{ (finance.indicators.irrTotal*100)|round(1) }}%|{{ (f.irrHigh*100)|round(1) }}%|{{ (f.irrSwing*100)|round(1) }}%
{% endfor %}@@END_TABLE@@

{% set top1 = finance.tables.sensitivity[0] %}
@@P@@<strong>Key finding</strong>: the project is most sensitive to {{ top1.label }} (IRR swing {{ (top1.irrSwing*100)|round(1) }}%){% if 'price' in top1.label or 'Sales' in top1.label %}, meaning securing sales is decisive for success{% elif 'CAPEX' in top1.label %}, meaning investment control during construction is decisive for execution{% endif %}.

@@H2@@13.3 Mitigation measures

@@H3@@13.3.1 Market risk

@@LIST@@
- Sign 3–5 year supply agreements with core customers (supermarket chains, restaurant groups, exporters) before execution, locking in 60–70% of capacity
- Pursue branding, organic and geographical-indication certification to raise the product premium
- Diversify product forms (live + chilled + fillets + ready-to-eat) to spread channel risk
- Track domestic and international market trends and adjust the sales strategy as needed
@@END_LIST@@

@@H3@@13.3.2 Technical risk

@@LIST@@
- Follow the biofilter start-up schedule strictly (4–8 weeks seeding + 12 weeks gradual loading), without rushing to full load
- Establish full biosecurity SOPs (intake disinfection, personnel disinfection, no shared tools, quarantine of new stock)
- N+1 redundancy on critical equipment + automatic changeover + manual inspection + remote monitoring
- Provide a backup generator (100% site load + 30 s auto-start)
- Build a 24×7 monitoring system (online DO, TAN, temperature, pH, flow + alarms)
- Bring in 1–2 experienced RAS specialists and systematically train new staff
@@END_LIST@@

@@H3@@13.3.3 Financial risk

@@LIST@@
- Include a 10–15% contingency in the estimate
- Phase equipment delivery and impose strict default clauses on vendors
- Use fixed-price (non-floating) main contracts to lock in construction cost
- Consider an interest-rate swap or a fixed-rate loan to hedge rate risk
- Keep ample working capital (6–12 months recommended); do not run on zero reserves
@@END_LIST@@

@@H3@@13.3.4 Policy risk

@@LIST@@
- Leave room in the design for environmental upgrades (reserved space and pipe connections)
- Produce to national food-safety standards and proactively obtain ISO 22000, HACCP and similar certification
- Keep land formalities fully compliant to avoid policy-change risk
- Monitor industry policy and apply for national and local grants in good time
@@END_LIST@@

@@H2@@13.4 Overall risk rating

@@TABLE@@
Category|Rating|Main risk|Mitigation
Market|<strong>High</strong>|price volatility|long-term contracts + branding
Technical|<strong>Medium</strong>|biofilter start-up + biosecurity|SOPs + N+1 redundancy + emergency response
Financial|<strong>Medium</strong>|cost overrun + construction delay|contingency + tight control
Policy|<strong>Low</strong>|tighter environmental rules|reserved upgrade capacity
@@END_TABLE@@

{% if finance.indicators.irrTotal >= finance.params.discount + 0.04 %}
@@P@@<strong>Overall assessment</strong>: at {{ (finance.indicators.irrTotal*100)|round(2) }}%, the IRR is well above the discount rate of {{ (finance.params.discount*100)|round(1) }}% (a margin of {{ ((finance.indicators.irrTotal - finance.params.discount)*100)|round(2) }}%), giving strong resilience: the project remains feasible even under moderately adverse conditions.
{% elif finance.indicators.irrTotal >= finance.params.discount %}
@@P@@<strong>Overall assessment</strong>: at {{ (finance.indicators.irrTotal*100)|round(2) }}%, the IRR is only slightly above the discount rate of {{ (finance.params.discount*100)|round(1) }}% (a margin of {{ ((finance.indicators.irrTotal - finance.params.discount)*100)|round(2) }}%), giving limited resilience; the mitigation measures must be enforced rigorously or adverse factors could push the project below the benchmark.
{% else %}
@@P@@<strong>Overall assessment</strong>: at {{ (finance.indicators.irrTotal*100)|round(2) }}%, the IRR is below the discount rate of {{ (finance.params.discount*100)|round(1) }}% and does not meet the financial benchmark. The design should be optimized before implementation is considered.
{% endif %}

@@P@@Key risk-control recommendations appear in Chapter 14 (Conclusion & Recommendation).
